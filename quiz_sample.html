<!DOCTYPE html>
<!-- 開発：丹羽隆一郎 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テストプレイ</title>
<style>
/*
  Quiz Game
  Version : 1.2.1
  Concept : 静かなゲーム / 思考を邪魔しないUI
  File    : quiz_v1.2.0.html

  CHANGELOG
  1.2.1
  - 画像付き問題の表示領域を再調整
  - 狭い縦長画面では縦長画像も上下表示に自動切替
  - クイズ作成者表記を初期画面下部へ移動

  1.2.0
  - 1問1画像の表示に対応
  - 横長・正方形は画像上／問題文下、縦長は画像左／問題文右の表示に対応
  - 画像付き問題でも単一HTML配布を維持

  1.1.0
  - ポーズ対象を問題表示中・解説表示中へ拡大
  - 正誤フィードバック演出を追加し、「不正解」を「誤り」へ変更
  - 生成クイズにクイズ作成者表記を追加

  1.0.0
  - v1.0.0リリース候補。長文問題の自動フォント調整、全角数字の正規化、文言校閲を反映
  - エディター統合版の出力プレイヤーとして固定

  0.5.0
  - エディター統合の基準プレイヤーとして整理
  - v0.4.6の保存分離・全記録リセット仕様を維持

  0.4.6
  - 成績画面に全クイズ記録リセットを控えめに追加
  - 全クイズ記録リセットは数字キー非対応、二段階確認、不可逆性警告つきで実装

  0.4.5
  - クイズ内容から保存IDを自動生成し、成績・復習対象が別クイズと混ざらないように変更
  - 成績リセット時に、このクイズの復習対象も合わせて削除

  0.4.4
  - ESCキーのポーズ処理で既定動作を抑制し、全画面解除との干渉を軽減
  - 成績画面を主要指標のカード表示へ整理し、最終プレイ日時を控えめな補助情報へ変更

  0.4.3
  - リザルト画面の「リトライ」「終了」を縦配置にし、数字キー順との対応を統一

  0.4.2
  - 訓練・復習の解説ボックスを中央オーバーレイ化し、クリック可能な控えめなホバー演出を追加
  - リザルト画面をScore・正答数・操作ボタン優先の構成へ整理

  0.4.1
  - スタート画面のサウンド・全画面ボタンを主操作より控えめな補助操作デザインへ再調整

  0.4.0
  - プレイモードを「挑戦 / 訓練 / 復習」の3構成に整理
  - 訓練・復習は時間制限なし、各問後に解説を控えめに表示
  - 復習対象として直近の挑戦で間違えた問題をLocalStorageに保存
  - 成績記録は挑戦のみ保存し、訓練・復習は記録対象外
  - スタート画面の数字キーを 1:挑戦 / 2:訓練 / 3:復習 / 4:成績 / 5:サウンド / 6:全画面 に整理
  - スタート画面のサウンド・全画面を補助操作として控えめな表示に調整

  0.3.2
  - 問題文表示を80msごとの文字表示に固定
  - 全文を透明状態で先に配置し、回答UI配置後に文字だけを順次表示
  - 全文表示後に1秒待ってからカウントダウンを開始

  0.3.1
  - 問題文を全文レイアウト済みの状態から文字単位で表示する方式に変更
  - 複数行問題でタイプ中に行数・幅が変わって見える問題を抑制
  - requestAnimationFrameベースの軽量アニメーションに変更し、古い表示処理の干渉を防止

  0.3.0
  - スタート画面に全画面ON/OFFを追加
  - スタート画面の主要ラベルを「挑戦」「成績」に整理
  - 問題文の高さと幅を事前確保し、タイプ中の位置ずれを抑制
  - 全画面ボタンをサウンドボタンの下に配置
  - 回答履歴をリザルト操作ボタンの下へ移動
  - ○×問題の answer 表記揺れに対応
  - 問題データの id なし運用に対応
  - 成績画面のクリックイベントが通知欄に表示される不具合を修正

  0.2.0
  - 問題データ形式を正式化（question / answer / options / category / difficulty / timeLimit / explanation）
  - 旧形式の問題データとの互換処理を追加
  - 問題ごとの制限時間に対応
  - リザルトの解答履歴にカテゴリ・難易度・解説を控えめに表示
  - 解説は展開式にして、プレイ中の思考テンポを邪魔しない設計に変更

  0.1.4
  - 埋め込みHTML/iframe環境を想定し、画面の高さに応じて余白・ボタン高さ・文字サイズを自動調整
  - 画面全体のスクロールではなく、アプリ領域内で収まるようにレスポンシブ制御を強化
  - サウンド機能を追加（デフォルトOFF、再読込後もOFF）
  - 初期画面とポーズ画面にサウンドON/OFFボタンを追加
  - ボタン操作音、正解音、不正解/時間切れ音をWeb Audio APIで軽量実装

  0.1.3
  - タイプライター表示中、最終表示幅を先に確保して文字位置が動かないよう調整
  - 中央から左右へ広がる見え方をやめ、左から右へ自然に読める表示へ変更
  - 表示完了後も中央寄りの安定した配置になるよう問題文レイアウトを調整

  0.1.2
  - タイプライター表示をJSタイマーで明確に1文字ずつ進む方式へ修正
  - OSの「視差効果を減らす」設定でも問題文表示は段階表示されるよう調整
  - タイプライター中断時の安全性を高めるため、実行IDで古いタイマーを無効化

  0.1.1
  - メニュー/ポーズ/リザルト/成績画面のボタン番号表示を削除
  - 問題選択肢のみ控えめな番号表示を維持
  - 問題文を1文字ずつ表示するタイプライター方式に変更
  - 問題文表示完了後、1秒待ってから20秒カウントダウンを開始
  - 理論値スコア達成時の専用ハイライトを追加

  0.1.0
  - キー入力を全画面で共通化（画面上のボタンを上から1〜4に割り当て）
  - ボタン押下時の触覚的な強調を追加
  - 画面切替に短いフェードアウトを追加
  - 問題文をタイプライト風に表示
  - リザルトの好成績ハイライトを追加
  - スコア計算を「正解した問題のみ速度ボーナス」に調整
  - スタート画面コピーをプレイコンセプト寄りに変更

  0.1.0c
  - タイマーを requestAnimationFrame ベースに変更
  - ポーズ中の時間が平均回答時間に混ざらないよう調整
  - リザルトに解答履歴を追加
  - 自己成績のリセット機能を追加
  - 画面表示とアクセシビリティを微調整

  0.1.0b
  - 円形タイマーゲージを追加
  - リザルト表示を強化
  - LocalStorage成績集計と自己成績画面を追加
  - 終了/リトライ導線を調整

  0.1.0a
  - 単一HTML構成
  - Start / Quiz / Pause / Result 画面
  - 2〜4択・○×問題の自動生成
  - 問題順・選択肢順シャッフル
  - タイマー、時間切れ処理
  - キーボード操作 1〜4 / Esc
  - ホバー・押下・正誤表示
  - LocalStorageへの基本成績保存
*/

:root{
  --font-main:"Noto Sans JP","BIZ UDPGothic","Yu Gothic UI",Meiryo,sans-serif;
  --bg:#f8f9fb;
  --panel:#ffffff;
  --text:#222222;
  --muted:#7a808a;
  --line:#e6e9ef;
  --shadow:0 18px 50px rgba(28,34,48,.08);
  --shadow-soft:0 8px 24px rgba(28,34,48,.08);
  --shadow-press:0 0 0 5px rgba(255,183,77,.14),0 10px 28px rgba(28,34,48,.12);

  --choice-1:#ef5350;
  --choice-2:#42a5f5;
  --choice-3:#ffca28;
  --choice-4:#66bb6a;
  --choice-1-bg:#fff1f0;
  --choice-2-bg:#eef7ff;
  --choice-3-bg:#fff9e5;
  --choice-4-bg:#effaf0;

  --ok:#2fb365;
  --ng:#e35050;
  --focus:#ffb74d;

  --radius:24px;
  --radius-small:16px;
  --fast:120ms ease;
  --normal:180ms ease;
  --timer-size:56px;
  --score-max:#7e57c2;
  --score-max-bg:#f3edff;
}

*{box-sizing:border-box}
html,body{height:100%;min-height:100%}
body{
  margin:0;
  font-family:var(--font-main);
  color:var(--text);
  background:
    radial-gradient(circle at 18% 8%, rgba(255,202,40,.12) 0, transparent 26%),
    radial-gradient(circle at 88% 12%, rgba(66,165,245,.11) 0, transparent 28%),
    radial-gradient(circle at top, #ffffff 0, var(--bg) 58%);
  min-height:100%;
  overflow:hidden;
}
button{font-family:inherit}
.app{
  height:100dvh;
  min-height:0;
  display:grid;
  place-items:center;
  padding:clamp(8px,3vw,36px);
  overflow:hidden;
}
.screen{
  width:min(960px,100%);
  height:min(760px, calc(100dvh - clamp(16px,6vw,72px)));
  max-height:calc(100dvh - 16px);
  min-height:0;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(230,233,239,.9);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:none;
  overflow:auto;
  overscroll-behavior:contain;
}
.screen.is-active{display:grid}
.screen.is-leaving{display:grid; animation:fadeOut 100ms ease both}

@keyframes fadeIn{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
@keyframes studyPanelIn{from{opacity:0; transform:translate(-50%,-47%)}to{opacity:1; transform:translate(-50%,-50%)}}
@keyframes fadeOut{from{opacity:1; transform:none}to{opacity:0; transform:translateY(3px)}}
@keyframes fadeSoft{from{opacity:.35}to{opacity:1}}
@keyframes pulseCorrect{0%{transform:scale(1)}40%{transform:scale(1.012)}100%{transform:scale(1)}}
@keyframes tactilePulse{0%{box-shadow:var(--shadow-soft)}35%{box-shadow:var(--shadow-press);filter:brightness(1.035)}100%{box-shadow:var(--shadow-soft);filter:none}}
@keyframes tactilePulseFlat{0%{box-shadow:none}35%{box-shadow:0 0 0 5px rgba(255,183,77,.14)}100%{box-shadow:none}}
@keyframes feedbackCorrectBounce{0%{opacity:0;transform:translate(-50%,-50%) scale(.86,1.12)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.08,.94)}72%{transform:translate(-50%,-50%) scale(.98,1.03)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes feedbackWrongShake{0%{opacity:0;transform:translate(-50%,-50%) translateX(0) scale(.98)}18%{opacity:1;transform:translate(-50%,-50%) translateX(-7px)}36%{transform:translate(-50%,-50%) translateX(6px)}54%{transform:translate(-50%,-50%) translateX(-4px)}72%{transform:translate(-50%,-50%) translateX(2px)}100%{opacity:1;transform:translate(-50%,-50%) translateX(0) scale(1)}}
@keyframes caretBlink{0%,45%{opacity:.45}46%,100%{opacity:0}}

/* 共通UI */
.btn{
  border:0;
  border-radius:999px;
  background:#222;
  color:#fff;
  padding:16px 28px;
  font-weight:800;
  font-size:1rem;
  cursor:pointer;
  transition:transform var(--fast), box-shadow var(--fast), filter var(--fast), background var(--fast);
  box-shadow:var(--shadow-soft);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  position:relative;
}
.btn:hover{transform:translateY(-2px); filter:brightness(1.04)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.is-pressed{animation:tactilePulse 260ms ease both}
.btn.secondary.is-pressed,.btn.danger.is-pressed{animation:tactilePulseFlat 260ms ease both}
.btn[data-key]::before{
  content:none;
  display:none;
}
.btn.secondary{background:#eef1f5;color:#222;box-shadow:none;border:1px solid var(--line)}
.btn.secondary.is-on{background:#fff9e8;color:#5f4312;border-color:rgba(255,183,77,.45)}
.btn.danger{background:#fff0f0;color:#c73535;box-shadow:none;border:1px solid #ffd7d7}
.btn:focus-visible,.choice:focus-visible{outline:4px solid rgba(255,183,77,.38); outline-offset:4px}

/* Start */
.start-screen{grid-template-rows:1fr auto 1fr;position:relative}
.start-inner{
  grid-row:2;
  width:min(640px,100%);
  margin:auto;
  padding:clamp(28px,5vw,60px);
  text-align:center;
}
.title-kicker{font-size:.78rem;letter-spacing:.16em;color:var(--muted);font-weight:800;text-transform:uppercase}
.game-title{font-size:clamp(2.2rem,7vw,5rem);line-height:1.05;margin:14px 0 10px;font-weight:900;letter-spacing:.02em}
.quiz-author{position:absolute;left:24px;right:24px;bottom:18px;margin:0;color:var(--muted);font-size:.78rem;font-weight:800;letter-spacing:.04em;text-align:center;opacity:.72}
.start-copy{color:var(--muted);line-height:1.8;margin:0 0 34px;font-weight:700}
.start-actions{display:grid;grid-template-columns:1fr;gap:12px;width:min(420px,100%);margin:0 auto}
.start-actions .btn{font-size:1.02rem;font-weight:900;letter-spacing:.03em;padding:15px 20px}
.start-actions .btn.start-utility{
  width:min(240px,62%);
  justify-self:center;
  padding:7px 13px;
  min-height:34px;
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.015em;
  background:rgba(255,255,255,.56);
  color:#6f7782;
  border:1px solid rgba(222,226,233,.86);
  box-shadow:none;
  opacity:.92;
}
.start-actions .btn.start-utility:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(28,34,48,.055);background:rgba(255,255,255,.84);filter:none;opacity:1}
.start-actions .btn.start-utility:active{transform:translateY(1px) scale(.99)}
.start-actions .btn.start-utility.is-on{background:rgba(255,249,232,.78);color:#6a4d1b;border-color:rgba(255,183,77,.32);opacity:1}
.start-actions .btn.fullscreen-toggle.start-utility.is-on{background:rgba(238,247,255,.78);color:#2f607f;border-color:rgba(66,165,245,.28);opacity:1}
.start-actions .btn.start-utility + .btn.start-utility{margin-top:-4px}
.start-actions .btn.secondary:not(.start-utility){background:#eef1f5;color:#222;box-shadow:none;border:1px solid var(--line)}
.start-toggles{display:grid;grid-template-columns:1fr;gap:10px;width:min(420px,100%);margin:16px auto 0}
.sound-toggle{
  margin-top:0;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.72);
  color:#555d68;
  padding:10px 16px;
  font-size:.88rem;
  font-weight:850;
  cursor:pointer;
  transition:transform var(--fast), box-shadow var(--fast), background var(--fast), color var(--fast);
}
.sound-toggle:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(28,34,48,.08);background:#fff}
.sound-toggle:active{transform:translateY(1px) scale(.99)}
.sound-toggle.is-on{background:#fff9e8;color:#5f4312;border-color:rgba(255,183,77,.45)}
.sound-toggle.is-pressed{animation:tactilePulseFlat 260ms ease both}
.pause-sound{margin:16px auto 0;display:inline-flex}
.fullscreen-toggle.is-on{background:#eef7ff;color:#1f527a;border-color:rgba(66,165,245,.38)}
.app:fullscreen{width:100vw;height:100dvh;padding:clamp(8px,3vw,36px);background:var(--bg)}
.app:-webkit-full-screen{width:100vw;height:100dvh;padding:clamp(8px,3vw,36px);background:var(--bg)}
.key-note{display:none;margin-top:22px;color:#9aa1aa;font-size:.9rem}
.start-notice{min-height:1.6em;margin:14px auto 0;color:#69707a;font-size:.9rem;font-weight:800;line-height:1.6}

/* Quiz */
.quiz-screen{
  position:relative;
  grid-template-rows:auto 1fr auto;
  padding:clamp(18px,3vw,34px);
  gap:clamp(14px,2vw,22px);
}
.quiz-top{
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  gap:14px;
  align-items:center;
  color:var(--muted);
  font-weight:800;
  font-size:.98rem;
}
.count-label{white-space:nowrap}
.timer-ring{
  width:var(--timer-size);
  height:var(--timer-size);
  border-radius:50%;
  display:grid;
  place-items:center;
  background:conic-gradient(#222 360deg, #edf0f4 0deg);
  position:relative;
  transition:background 160ms linear;
}
.timer-ring::before{
  content:"";
  position:absolute;
  inset:5px;
  border-radius:50%;
  background:#fff;
  box-shadow:inset 0 0 0 1px var(--line);
}
.time-label{
  position:relative;
  z-index:1;
  font-size:.98rem;
  font-weight:900;
  color:#222;
  line-height:1;
}
.timer-ring.is-low{background:conic-gradient(var(--ng) 360deg, #edf0f4 0deg)}
.timer-ring.is-off{background:#f2f4f7}
.timer-ring.is-off::before{background:#fff}
.timer-ring.is-off .time-label{color:#9aa1aa}
.pause-btn{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#444;cursor:pointer;
  font-size:1.1rem;transition:transform var(--fast), background var(--fast), box-shadow var(--fast);
}
.pause-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
.pause-btn:active{transform:translateY(1px) scale(.98)}
.pause-btn.is-pressed{animation:tactilePulseFlat 260ms ease both}
.progress{height:8px;background:#eef1f5;border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:#222;border-radius:999px;transition:width 220ms ease}
.quiz-main{
  display:grid;
  grid-template-rows:var(--question-box-height, minmax(150px, 34%)) auto;
  align-content:center;
  gap:clamp(18px,4vw,42px);
  min-height:0;
}
.question-wrap{
  display:grid;
  place-items:center;
  padding:clamp(10px,2vw,24px);
  min-height:var(--question-space, 150px);
  max-height:var(--question-max-height, none);
  overflow:hidden;
}
.question-wrap.has-image{
  gap:clamp(10px,2vw,18px);
  align-content:center;
  justify-items:center;
}
.question-wrap.has-image.layout-top{
  grid-template-rows:auto auto;
}
.question-wrap.has-image.layout-side{
  grid-template-columns:minmax(140px,var(--image-column-width,38%)) minmax(0,1fr);
  grid-template-rows:1fr;
  justify-items:stretch;
  align-items:center;
}
.question-image-box{
  display:grid;
  place-items:center;
  width:min(780px,100%);
  height:auto;
  max-height:var(--image-max-height, min(30vh,240px));
  min-height:0;
  overflow:hidden;
}
.question-wrap.layout-side .question-image-box{
  width:100%;
  max-height:var(--image-max-height, min(42vh,340px));
}
.question-image-box[hidden]{display:none}
.question-image{
  display:block;
  max-width:100%;
  max-height:var(--image-max-height, 100%);
  width:auto;
  height:auto;
  object-fit:contain;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  box-shadow:var(--shadow-soft);
}
.question-wrap.has-image .question{
  font-size:var(--question-font-size, clamp(1.2rem,3vw,2.05rem));
}
.question-wrap.layout-side .question{
  max-width:100%;
  text-align:left;
}
.question-wrap.layout-top .question{
  max-width:min(780px,100%);
}
.question-wrap.is-scrollable{
  overflow:auto;
  scrollbar-width:thin;
  overscroll-behavior:contain;
}
@media (max-width:720px), (max-height:680px){
  .question-wrap.has-image.layout-side{
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
  }
  .question-wrap.layout-side .question{
    text-align:center;
  }
}
.question{
  width:min(820px,100%);
  text-align:center;
  font-weight:900;
  font-size:var(--question-font-size, clamp(1.7rem,4.4vw,3.05rem));
  line-height:var(--question-line-height, 1.45);
  letter-spacing:.01em;
  margin:0;
  overflow-wrap:anywhere;
  white-space:pre-wrap;
}
.question.is-typing,
.question.is-complete{
  position:relative;
  width:var(--question-text-width, fit-content);
  max-width:min(820px,100%);
  min-height:var(--question-text-height, auto);
  text-align:left;
}
.question-reveal{
  display:block;
  width:100%;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}
.question-char{
  opacity:0;
  transition:opacity 60ms ease-out;
}
.question-char.is-visible{opacity:1}
.question.is-complete .question-char{opacity:1}
.choices{
  width:min(760px,100%);
  margin:0 auto;
  display:grid;
  gap:clamp(12px,2vw,18px);
}
.choice{
  --choice:#999;
  --choice-bg:#f5f5f5;
  position:relative;
  width:100%;
  min-height:68px;
  border:2px solid transparent;
  border-left:10px solid var(--choice);
  background:linear-gradient(0deg,var(--choice-bg),var(--choice-bg));
  color:#20242a;
  border-radius:20px;
  padding:16px 22px 16px 18px;
  display:grid;
  grid-template-columns:48px 1fr;
  align-items:center;
  gap:6px;
  text-align:left;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(18,24,36,.06);
  transition:transform var(--fast), box-shadow var(--fast), filter var(--fast), border-color var(--fast), background var(--fast);
  font-size:clamp(1.05rem,2.4vw,1.45rem);
  font-weight:850;
  line-height:1.45;
}
.choice:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 16px 32px rgba(18,24,36,.10);filter:brightness(1.018)}
.choice:active:not(:disabled){transform:translateY(1px) scale(.992)}
.choice.is-pressed:not(:disabled){animation:tactilePulse 260ms ease both}
.choice:disabled{cursor:default}
.choice-index{display:grid;place-items:center;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.75);font-weight:900;color:#222}
.choice:nth-child(1){--choice:var(--choice-1);--choice-bg:var(--choice-1-bg)}
.choice:nth-child(2){--choice:var(--choice-2);--choice-bg:var(--choice-2-bg)}
.choice:nth-child(3){--choice:var(--choice-3);--choice-bg:var(--choice-3-bg)}
.choice:nth-child(4){--choice:var(--choice-4);--choice-bg:var(--choice-4-bg)}
.choice.is-correct{background:#eaf8ef;border-color:rgba(47,179,101,.55);border-left-color:var(--ok);animation:pulseCorrect 450ms ease both}
.choice.is-wrong{background:#fff0f0;border-color:rgba(227,80,80,.55);border-left-color:var(--ng)}
.choice.is-dim{opacity:.58;filter:saturate(.7)}
.quiz-footer{min-height:0;text-align:center;color:#9aa1aa;font-weight:700;font-size:.92rem}
.study-panel{
  position:absolute;
  left:50%;
  top:52%;
  z-index:9;
  width:min(680px, calc(100% - 48px));
  max-height:min(42vh, 280px);
  overflow:auto;
  margin:0;
  padding:clamp(18px,3vw,26px);
  border:1px solid rgba(230,233,239,.98);
  border-radius:22px;
  background:rgba(255,255,255,.96);
  text-align:left;
  color:#4f5661;
  box-shadow:0 20px 55px rgba(18,24,36,.14);
  animation:studyPanelIn 180ms ease both;
  cursor:pointer;
  transform:translate(-50%,-50%);
  transition:background var(--normal), border-color var(--normal), box-shadow var(--normal), transform var(--normal), filter var(--normal);
}
.study-panel[hidden]{display:none}
.study-panel:hover,
.study-panel:focus-visible{
  background:#fff;
  border-color:rgba(255,183,77,.58);
  box-shadow:0 24px 62px rgba(18,24,36,.17), 0 0 0 4px rgba(255,183,77,.10);
  transform:translate(-50%,-50%) translateY(-2px);
  outline:none;
}
.study-panel:active{transform:translate(-50%,-50%) translateY(0) scale(.995)}
.study-panel-title{font-weight:900;color:#424750;margin:0 0 8px;font-size:.96rem}
.study-panel-body{line-height:1.8;font-weight:750;overflow-wrap:anywhere;font-size:clamp(.98rem,2.2vw,1.08rem)}
.study-panel-actions{display:none}
.study-next{display:none}
.hint-tip{opacity:0;transform:translateY(4px);transition:opacity 600ms ease, transform 600ms ease}
.hint-tip.is-show{opacity:1;transform:none}
.feedback{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.98);
  min-width:180px;padding:18px 28px;border-radius:999px;background:rgba(34,34,34,.88);color:#fff;
  font-weight:900;text-align:center;box-shadow:var(--shadow);opacity:0;pointer-events:none;z-index:10;
}
.feedback.is-show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.feedback.ok{background:rgba(47,179,101,.92)}
.feedback.ng{background:rgba(227,80,80,.92)}
.feedback.ok.is-show{animation:feedbackCorrectBounce 360ms cubic-bezier(.18,1.28,.35,1) both}
.feedback.ng.is-show{animation:feedbackWrongShake 320ms ease both}

/* Pause / Result / Record */
.center-screen{place-items:center;padding:clamp(24px,5vw,60px)}
.dialog{
  width:min(520px,100%);
  text-align:center;
  padding:clamp(24px,5vw,48px);
}
.dialog h2{font-size:clamp(2rem,5vw,3.4rem);margin:0 0 16px;line-height:1.15}
.dialog p{margin:0 0 28px;color:var(--muted);font-weight:700;line-height:1.8}
.dialog-actions{display:grid;gap:12px;width:min(320px,100%);margin:0 auto}
.result-dialog{width:min(680px,100%);padding:clamp(20px,3.6vw,38px)}
.result-dialog h2{font-size:clamp(1.55rem,4vw,2.6rem);margin-bottom:12px;color:#30343a}
.result-message{width:min(560px,100%);margin:10px auto 10px;color:#646b75;font-size:.92rem;line-height:1.65}
.result-actions{grid-template-columns:1fr;width:min(320px,100%);margin:12px auto 8px;gap:10px}
.pause-meta{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:0 0 28px;color:#555;font-weight:900}
.result-hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:2px auto 12px;width:min(560px,100%)}
.result-support-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px auto 10px;width:min(620px,100%)}
.result-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff;transition:border-color var(--normal), background var(--normal), box-shadow var(--normal), transform var(--normal)}
.result-card .num{font-size:clamp(1.35rem,3vw,2rem);font-weight:900;line-height:1.08;letter-spacing:.01em}
.result-card .lab{color:var(--muted);font-weight:850;font-size:.82rem;margin-top:5px;letter-spacing:.02em}
.result-primary{border-radius:22px;padding:22px 18px;background:linear-gradient(180deg,#fff,#f9fafc);box-shadow:0 12px 28px rgba(18,24,36,.06)}
.result-primary .num{font-size:clamp(2.3rem,7vw,4rem)}
.result-primary .lab{font-size:.9rem;color:#666e79}
.result-support{padding:10px 9px;border-radius:14px;background:#fbfcfe}
.result-support .num{font-size:clamp(1rem,2.5vw,1.32rem);white-space:nowrap}
.result-support .lab{font-size:.72rem;margin-top:4px}
.result-card.is-best{border-color:rgba(255,202,40,.75);background:linear-gradient(180deg,#fffdf3,#fff8df);box-shadow:0 12px 30px rgba(255,202,40,.16)}
.result-card.is-theoretical{border-color:rgba(126,87,194,.72);background:linear-gradient(180deg,#faf7ff,var(--score-max-bg));box-shadow:0 14px 34px rgba(126,87,194,.16)}
.result-card.is-good{border-color:rgba(102,187,106,.55);background:#f2fbf3}
.result-card.is-perfect{border-color:rgba(47,179,101,.7);background:linear-gradient(180deg,#edfbf1,#e3f7e9);box-shadow:0 12px 30px rgba(47,179,101,.12)}
.result-card.is-best .num,.result-card.is-perfect .num,.result-card.is-theoretical .num{transform:translateY(-1px)}
.record-dialog{width:min(680px,100%);padding:clamp(20px,3.6vw,38px)}
.record-dialog h2{margin-bottom:8px}
.record-lead{margin:0 auto 16px!important;color:#858c96!important;font-size:.88rem;font-weight:750;line-height:1.6}
.record-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;width:min(620px,100%);margin:12px auto 10px;text-align:center}
.record-row{display:grid;place-items:center;gap:6px;min-height:92px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px 10px}
.record-row strong{font-size:clamp(1.28rem,3vw,1.86rem);line-height:1.08;letter-spacing:.01em}
.record-row span{color:var(--muted);font-size:.78rem;font-weight:800;line-height:1.35}
.record-meta-note{grid-column:1 / -1;width:min(620px,100%);margin:0 auto 16px;color:#a2a8b1;font-size:.78rem;font-weight:700;text-align:right;line-height:1.5}
.empty-record{color:var(--muted);font-weight:800;text-align:center;padding:18px;border:1px dashed var(--line);border-radius:16px;background:#fff;grid-column:1 / -1}
.record-notice{min-height:1.5em;margin:0 auto 14px;color:#69707a;font-size:.88rem;font-weight:800;text-align:center}
.record-notice.is-alert{color:#b45b12}
.record-notice.is-done{color:#2f7a4d}
#resetRecordBtn.is-confirming{background:#fff7e8;color:#9a5a00;border-color:#ffdca2}
.record-danger-zone{width:min(320px,100%);margin:12px auto 0;padding-top:10px;border-top:1px solid #f0f2f6;text-align:center}
.record-global-reset{appearance:none;border:0;background:transparent;color:#b4a8a1;font:inherit;font-size:.72rem;font-weight:850;line-height:1.4;padding:7px 10px;border-radius:999px;cursor:pointer;transition:background var(--fast), color var(--fast), box-shadow var(--fast)}
.record-global-reset:hover,.record-global-reset:focus-visible{background:#fff8ed;color:#9a5a00;box-shadow:0 0 0 3px rgba(255,183,77,.12);outline:0}
.record-global-reset.is-confirming{background:#fff1e7;color:#a1421f;box-shadow:0 0 0 3px rgba(255,138,101,.14)}


.answer-review{
  width:min(620px,100%);
  margin:8px auto 0;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  overflow:hidden;
  text-align:left;
}
.answer-review summary{
  list-style:none;
  cursor:pointer;
  padding:11px 14px;
  font-weight:900;
  color:#424750;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.answer-review summary::-webkit-details-marker{display:none}
.answer-review summary::after{content:"＋";color:var(--muted);font-weight:900}
.answer-review[open] summary::after{content:"−"}
.review-list{display:grid;border-top:1px solid var(--line)}
.review-item{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:12px;
  align-items:center;
  padding:12px 16px;
  border-top:1px solid #f0f2f5;
}
.review-item:first-child{border-top:0}
.review-mark{
  width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
  font-weight:900;color:#fff;font-size:.9rem;
}
.review-mark.ok{background:var(--ok)}
.review-mark.ng{background:var(--ng)}
.review-main{min-width:0}
.review-question{font-weight:850;line-height:1.45;overflow-wrap:anywhere}
.review-answer{margin-top:3px;color:var(--muted);font-size:.86rem;font-weight:700;line-height:1.45}
.review-time{color:#6d7480;font-weight:900;font-size:.92rem;white-space:nowrap}
.mini-note{
  color:#9aa1aa;
  font-size:.86rem;
  font-weight:700;
  line-height:1.6;
  margin-top:10px;
}

.review-meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:7px;
}
.review-pill{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:3px 8px;
  border-radius:999px;
  background:#f5f7fa;
  color:#737b86;
  font-size:.76rem;
  font-weight:850;
  line-height:1.2;
}
.review-explanation{
  grid-column:2 / 4;
  margin-top:-2px;
  border:1px solid #edf0f4;
  border-radius:14px;
  background:#fbfcfe;
  overflow:hidden;
}
.review-explanation summary{
  cursor:pointer;
  padding:9px 12px;
  color:#555d68;
  font-weight:900;
  font-size:.86rem;
  list-style:none;
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.review-explanation summary::-webkit-details-marker{display:none}
.review-explanation summary::after{content:"＋";color:#a0a6af;font-weight:900}
.review-explanation[open] summary::after{content:"−"}
.review-explanation-body{
  border-top:1px solid #edf0f4;
  padding:10px 12px 12px;
  color:#555d68;
  font-size:.9rem;
  font-weight:650;
  line-height:1.75;
  overflow-wrap:anywhere;
}

@media (max-width:640px){
  .app{padding:10px}
  .start-actions,.start-toggles{grid-template-columns:1fr}
  .screen{height:calc(100dvh - 20px);max-height:calc(100dvh - 20px);border-radius:22px}
  .quiz-screen{padding:18px 14px}
  :root{--timer-size:50px}
  .quiz-top{grid-template-columns:auto 1fr auto auto;gap:10px;font-size:.86rem}
  .progress{height:7px}
  .quiz-main{grid-template-rows:var(--question-box-height, minmax(170px, 32%)) auto;gap:18px}
  .question{font-size:var(--question-font-size, clamp(1.55rem,7.5vw,2.25rem))}
  .choice{grid-template-columns:42px 1fr;min-height:64px;padding:14px 16px 14px 14px;border-radius:18px;font-size:clamp(1rem,5vw,1.24rem)}
  .choice-index{width:32px;height:32px}
  .result-hero{grid-template-columns:1fr 1fr}
  .result-support-grid{grid-template-columns:1fr 1fr}
  .result-primary{padding:18px 12px}
  .record-list{grid-template-columns:1fr 1fr}
  .record-meta-note{text-align:center}
  .review-item{grid-template-columns:auto 1fr;align-items:start}
  .review-time{grid-column:2;justify-self:start;font-size:.84rem}
  .review-explanation{grid-column:2}
}


@media (max-height:700px){
  .app{padding:8px}
  .screen{height:calc(100dvh - 16px);max-height:calc(100dvh - 16px);border-radius:20px}
  .start-inner{padding:22px 18px}
  .game-title{font-size:clamp(2rem,9vh,3.6rem);margin:8px 0 10px}
  .start-copy{margin-bottom:18px;line-height:1.55}
  .start-toggles{margin-top:10px;gap:8px}
  .sound-toggle{padding:9px 12px;font-size:.82rem}
  .start-actions .btn.start-utility{padding:6px 11px;min-height:32px;font-size:.74rem;width:min(220px,64%)}
  .quiz-screen{padding:12px;gap:9px}
  :root{--timer-size:46px}
  .quiz-top{gap:8px;font-size:.84rem}
  .progress{height:6px}
  .pause-btn{width:40px;height:40px}
  .quiz-main{grid-template-rows:var(--question-box-height, auto) auto;align-content:start;gap:10px}
  .question-wrap{padding:4px;min-height:var(--question-space, 0)}
  .question{font-size:var(--question-font-size, clamp(1.28rem,5vh,2.15rem));line-height:var(--question-line-height, 1.36)}
  .choices{gap:8px}
  .choice{min-height:50px;padding:9px 13px 9px 10px;border-radius:16px;font-size:clamp(.94rem,3.6vh,1.16rem);border-left-width:8px;grid-template-columns:36px 1fr}
  .choice-index{width:28px;height:28px;font-size:.88rem}
  .quiz-footer{min-height:0;font-size:.82rem}
  .center-screen{padding:16px}
  .dialog{padding:18px}
  .dialog h2{font-size:clamp(1.8rem,8vh,3rem);margin-bottom:10px}
  .dialog p{margin-bottom:16px;line-height:1.55}
  .pause-meta{margin-bottom:16px}
  .result-hero{gap:8px;margin:0 auto 8px}
  .result-support-grid{gap:6px;margin:6px auto 8px}
  .result-card{padding:10px 12px}
  .result-primary{padding:14px 10px}
  .result-actions{margin:8px auto 6px}
  .result-message{margin:6px auto;font-size:.86rem;line-height:1.5}
  .record-dialog{padding:18px}
  .record-lead{margin-bottom:10px!important}
  .record-list{gap:7px;margin:8px auto 8px}
  .record-row{min-height:74px;padding:10px 8px;border-radius:15px}
  .record-row strong{font-size:1.18rem}
  .record-row span{font-size:.72rem}
  .record-meta-note{margin-bottom:10px;font-size:.72rem}
  .record-danger-zone{margin-top:8px;padding-top:8px}
  .record-global-reset{font-size:.68rem;padding:6px 9px}
  .answer-review{margin-top:2px}
}

<body>
<div class="app" id="app">
  <section class="screen start-screen is-active" id="screenStart" aria-label="初期画面">
    <div class="start-inner">
      <div class="title-kicker">Quiz Game v1.2.1</div>
      <h1 class="game-title" id="gameTitle">テストプレイ</h1>
      <div class="quiz-author" id="quizAuthor">クイズ作成：匿名</div>
      <p class="start-copy">静かに、速く、正確に。知識を確かめる時間です。</p>
      <div class="start-actions" aria-label="初期操作">
        <button class="btn" id="startBtn" data-key="1" aria-keyshortcuts="1">挑戦</button>
        <button class="btn secondary" id="trainingBtn" data-key="2" aria-keyshortcuts="2">訓練</button>
        <button class="btn secondary" id="reviewModeBtn" data-key="3" aria-keyshortcuts="3">復習</button>
        <button class="btn secondary" id="recordBtn" data-key="4" aria-keyshortcuts="4">成績</button>
        <button class="btn secondary sound-toggle start-utility" id="startSoundBtn" type="button" data-key="5" aria-keyshortcuts="5" aria-pressed="false">サウンド OFF</button>
        <button class="btn secondary fullscreen-toggle sound-toggle start-utility" id="startFullscreenBtn" type="button" data-key="6" aria-keyshortcuts="6" aria-pressed="false">全画面 OFF</button>
      </div>
      <div class="start-notice" id="startNotice" aria-live="polite"></div>
      <div class="key-note" aria-hidden="true"></div>
    </div>
  </section>

  <section class="screen quiz-screen" id="screenQuiz" aria-label="問題画面">
    <header class="quiz-top">
      <div class="count-label" id="countLabel">1 / 4</div>
      <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
      <div class="timer-ring" id="timerRing" aria-label="残り時間"><span class="time-label" id="timeLabel">20</span></div>
      <button class="pause-btn" id="pauseBtn" aria-label="ポーズ">Ⅱ</button>
    </header>
    <main class="quiz-main" id="quizMain">
      <div class="question-wrap" id="questionWrap">
        <div class="question-image-box" id="questionImageBox" hidden><img class="question-image" id="questionImage" alt="image/none"></div>
        <h2 class="question" id="questionText"></h2>
      </div>
      <div class="choices" id="choices"></div>
    </main>
    <footer class="quiz-footer"><div class="hint-tip" id="hintTip" aria-hidden="true"></div><div class="study-panel" id="studyPanel" role="button" tabindex="0" aria-label="解説を確認して次へ進む" hidden><div class="study-panel-title" id="studyPanelTitle">解説</div><div class="study-panel-body" id="studyPanelBody"></div></div></footer>
  </section>

  <section class="screen center-screen" id="screenPause" aria-label="ポーズ画面">
    <div class="dialog">
      <h2>Pause</h2>
      <div class="pause-meta">
        <span id="pauseCount">1 / 4</span>
        <span id="pauseTime">残り 20 秒</span>
      </div>
      <div class="dialog-actions">
        <button class="btn" id="resumeBtn" data-key="1" aria-keyshortcuts="1">再開</button>
        <button class="btn secondary" id="retryFromPauseBtn" data-key="2" aria-keyshortcuts="2">リトライ</button>
        <button class="btn danger" id="quitFromPauseBtn" data-key="3" aria-keyshortcuts="3">終了</button>
      </div>
      <button class="sound-toggle pause-sound" id="pauseSoundBtn" type="button" data-key="4" aria-keyshortcuts="4" aria-pressed="false">サウンド OFF</button>

function ensureAudio(){
  if(!state.audioContext){
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(!AudioContextClass) return null;
    state.audioContext = new AudioContextClass();
    state.masterGain = state.audioContext.createGain();
    state.masterGain.gain.value = 0.055;
    state.masterGain.connect(state.audioContext.destination);
  }
  if(state.audioContext.state === 'suspended'){
    state.audioContext.resume().catch(() => {});
  }
  return state.audioContext;
}

function playTone({frequency=440, duration=0.08, type='sine', gain=0.55, delay=0}){
  if(!state.soundEnabled) return;
  const ctx = ensureAudio();
  if(!ctx || !state.masterGain) return;
  const start = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  env.gain.setValueAtTime(0.0001, start);
  env.gain.linearRampToValueAtTime(gain, start + 0.012);
  env.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(env);
  env.connect(state.masterGain);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function getFullscreenElement(){
  return document.fullscreenElement || document.webkitFullscreenElement || null;
}
function getFullscreenTarget(){
  return $('app') || document.documentElement;
}
function canUseFullscreen(){
  const target = getFullscreenTarget();
  return !!((document.fullscreenEnabled || document.webkitFullscreenEnabled) && (target.requestFullscreen || target.webkitRequestFullscreen));
}
function updateFullscreenButtons(){
  ['startFullscreenBtn'].forEach(id => {
    const btn = $(id);
    if(!btn) return;
    if(!canUseFullscreen()){
      btn.textContent = '全画面 非対応';
      btn.disabled = true;
      btn.classList.remove('is-on');
      btn.setAttribute('aria-pressed', 'false');
      return;
    }
    const active = !!getFullscreenElement();
    btn.textContent = active ? '全画面 ON' : '全画面 OFF';
    btn.classList.toggle('is-on', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}
function toggleFullscreen(){
  if(!canUseFullscreen()) return;
  const current = getFullscreenElement();
  try{
    if(current){
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      const result = exit ? exit.call(document) : null;
      if(result && typeof result.catch === 'function') result.catch(() => {});
      return;
    }
    const target = getFullscreenTarget();
    const request = target.requestFullscreen || target.webkitRequestFullscreen;
    const result = request ? request.call(target) : null;
    if(result && typeof result.catch === 'function') result.catch(() => {});
  }catch(e){
    updateFullscreenButtons();
  }
}

function updateViewportClass(){

}

function normalizeText(value){ return String(value ?? '').trim(); }
function toHalfWidthDigits(value){
  return String(value ?? '').replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}
function normalizeNumericText(value){
  return toHalfWidthDigits(value).replace(/[　\s]+/g, '').trim();
}
function getRawQuestion(row){
  return row.question ?? row.q ?? row.text ?? row['問題'] ?? row['問題文'] ?? '';
}
function getRawAnswer(row){
  return row.answer ?? row.a ?? row.correct ?? row['正解'] ?? '';
}
function getRawExplanation(row){
  return row.explanation ?? row.commentary ?? row['解説'] ?? '';
}
function getRawCategory(row){
  return row.category ?? row.cat ?? row['カテゴリ'] ?? row['分類'] ?? '';
}
function getRawDifficulty(row){
  return row.difficulty ?? row.level ?? row['難易度'] ?? '';
}
function safeStorageSegment(value){
  const compact = normalizeText(value).replace(/[\s\u3000]+/g, '_').replace(/[^A-Za-z0-9_\-぀-ヿ㐀-鿿]/g, '');
  return (compact || 'quiz').slice(0, 32);
}
function hashString(input){
  let hash = 2166136261;
  for(let i=0;i<input.length;i++){
    hash ^= input.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(36).padStart(7, '0');
}
function buildQuizStorageId(data, title){
  const rows = Array.isArray(data) ? data : [];
  const source = rows.map((row, index) => ({
    n:index + 1,
    id:normalizeText(row?.id ?? row?.ID ?? row?.['ID'] ?? ''),
    q:normalizeText(getRawQuestion(row || {})),
    a:normalizeText(getRawAnswer(row || {})),
    o:getRawOptions(row || {}).map(normalizeText),
    c:normalizeText(getRawCategory(row || {})),
    d:normalizeNumericText(getRawDifficulty(row || {})),
    t:normalizeNumericText(getTimeLimitValue(row || {})),
    img:row?.image?.src ? hashString(`${row.image.layout || ''}:${row.image.src}`) : ''
  }));
  return `${safeStorageSegment(title)}_${hashString(JSON.stringify({title:normalizeText(title), rows}))}`;
}
function normalizeDifficulty(value){
  const n = Number(normalizeNumericText(value));
  if(!Number.isFinite(n)) return 3;
  return Math.max(1, Math.min(5, Math.round(n)));
}
function normalizeTimeLimit(value){
  const n = Number(normalizeNumericText(value));
  if(!Number.isFinite(n) || n <= 0) return DEFAULT_TIME_LIMIT;
  return Math.max(5, Math.min(600, Math.round(n)));
}
function getTimeLimitValue(row){
  return row.timeLimit ?? row.timelimit ?? row.time_limit ?? row['制限時間'];
}
function getRawOptions(row){
  if(Array.isArray(row.options)) return row.options.map(normalizeText).filter(Boolean);
  return [row.option1, row.option2, row.option3, row['オプション1'], row['オプション2'], row['オプション3']]
    .map(normalizeText)
    .filter(Boolean);
}
function normalizeYesNoToken(value){
  const raw = normalizeText(value);
  const normalized = raw.toLowerCase().replace(/[　\s_-]/g, '');
  const yesTokens = new Set(['イエス','いえす','はい','yes','y','true','t','1','○','〇','まる','マル','正しい']);
  const noTokens = new Set(['ノー','のー','いいえ','no','n','false','f','0','×','✕','ばつ','バツ','誤り']);
  if(yesTokens.has(raw) || yesTokens.has(normalized)) return 'yes';
  if(noTokens.has(raw) || noTokens.has(normalized)) return 'no';
  return '';
}
function isYesNoRow(row){
  const ans = normalizeText(row.answer ?? row['正解']);
  const opts = getRawOptions(row);
  return !!normalizeYesNoToken(ans) && opts.length === 0;
}
function normalizeImageData(value){
  if(!value || typeof value !== 'object') return null;
  const src = String(value.src || '');
  if(!src || !src.startsWith('data:image/')) return null;
  const rawLayout = String(value.layout || value.aspect || '').toLowerCase();
  const layout = ['landscape','square','portrait'].includes(rawLayout) ? rawLayout : 'landscape';
  return {
    src,
    layout,
    alt:'image/none'
  };
}
function normalizeQuestionData(row, index){
  const id = normalizeText(row.id) || `q${String(index + 1).padStart(3,'0')}`;
  const question = normalizeText(row.question ?? row['問題']);
  const rawAnswer = normalizeText(row.answer ?? row['正解']);
  const category = normalizeText(row.category ?? row['カテゴリ']);
  const explanation = normalizeText(row.explanation ?? row['解説']);
  const difficulty = normalizeDifficulty(row.difficulty ?? row['難易度']);
  const timeLimit = normalizeTimeLimit(getTimeLimitValue(row));
  const image = normalizeImageData(row.image ?? row['画像']);

  if(isYesNoRow(row)){
    const yes = normalizeYesNoToken(rawAnswer) === 'yes';
    return {
      id,
      type:'truefalse',
      question,
      answer: yes ? '○' : '×',
      options:['○','×'],
      explanation,
      category,
      difficulty,
      timeLimit,
      ...(image ? {image} : {})
    };
  }

  const options = [rawAnswer, ...getRawOptions(row)];
  return {
    id,
    type:'choice',
    question,
    answer: rawAnswer,
    options: unique(options),
    explanation,
    category,
    difficulty,
    timeLimit,
    ...(image ? {image} : {})
  };
}
function unique(arr){ return [...new Set(arr.map(normalizeText).filter(Boolean))]; }
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function changeScreen(name, afterShown){
  const previousName = state.screen;
  const previous = screens[previousName];
  const next = screens[name];
  state.screen = name;
  hideFeedback();

  if(!next) return;
  if(previousName === name || !previous || !previous.classList.contains('is-active')){
    Object.entries(screens).forEach(([key, el]) => {
      el.classList.toggle('is-active', key === name);
      el.classList.remove('is-leaving');
    });
    if(typeof afterShown === 'function') afterShown();
    return;
  }

  const token = ++state.screenChangeToken;
  previous.classList.remove('is-active');
  previous.classList.add('is-leaving');

  setTimeout(() => {
    if(token !== state.screenChangeToken) return;
    Object.entries(screens).forEach(([key, el]) => {
      el.classList.toggle('is-active', key === name);
      el.classList.remove('is-leaving');
    });
    if(typeof afterShown === 'function') afterShown();
  }, SCREEN_FADE_MS);
}

function getModeConfig(mode = state.mode){
  const configs = {
    challenge:{key:'challenge', label:'挑戦', timer:true, shuffleQuestions:true, record:true, study:false},
    training:{key:'training', label:'訓練', timer:false, shuffleQuestions:false, record:false, study:true},
    review:{key:'review', label:'復習', timer:false, shuffleQuestions:true, record:false, study:true}
  };
  return configs[mode] || configs.challenge;
}
function hasTimer(){ return !!getModeConfig().timer; }
function isStudyMode(){ return !!getModeConfig().study; }
function setStartNotice(message = ''){

}
function getLastMissedIds(){
  try{
    const parsed = JSON.parse(localStorage.getItem(LAST_MISSED_KEY) || '[]');
    return Array.isArray(parsed) ? parsed.map(normalizeText).filter(Boolean) : [];
  }catch(e){ return []; }
}
function saveLastMissedFromLog(){
  if(state.mode !== 'challenge') return;
  const ids = state.answerLog.filter(item => !item.correct && item.id).map(item => item.id);
  try{ localStorage.setItem(LAST_MISSED_KEY, JSON.stringify([...new Set(ids)])); }

function getModeQuestions(mode){

function advanceFromStudyPanel(){

function updateTimerForMode(seconds){

function buildGame(mode = 'challenge'){
  stopTimer();
  clearQuestionAnimation();
  hideFeedback();
  hideStudyPanel();
  state.mode = mode;
  let questions = getModeQuestions(mode);
  if(mode !== 'training') questions = shuffle(questions);
  state.questions = questions;
  state.index = 0;
  state.correct = 0;
  state.locked = false;
  state.countdownPending = false;
  state.delayRemainingMs = 0;
  state.currentTimeLimit = getModeConfig(mode).timer ? DEFAULT_TIME_LIMIT : 0;
  state.remaining = state.currentTimeLimit;
  state.isPaused = false;
  state.questionReveal = null;
  state.answerTimes = [];
  state.answerLog = [];
  state.playStart = performance.now();
  return state.questions.length > 0;
}
function startGame(mode = 'challenge'){
  setStartNotice('');
  if(!buildGame(mode)){
    setStartNotice(mode === 'review' ? '直近の挑戦で復習対象はありません。' : '問題データがありません。');
    changeScreen('START');
    return;
  }
  changeScreen('QUIZ', () => {

function resetQuestionImage(){

}
function renderQuestionImage(image){
  const normalized = normalizeImageData(image);

  if(!normalized || !wrap || !box || !img) return false;

function showQuestion(){
  stopTimer();
  state.countdownPending = false;
  state.delayRemainingMs = 0;
  state.locked = true;
  hideStudyPanel();
  const q = state.questions[state.index];
  state.currentTimeLimit = hasTimer() ? (q.timeLimit || DEFAULT_TIME_LIMIT) : 0;
  state.remaining = state.currentTimeLimit;
  $('quizMain').style.animation = 'none';
  void $('quizMain').offsetWidth;
  $('quizMain').style.animation = 'fadeSoft 180ms ease both';
  $('countLabel').textContent = `${getModeConfig().label} ${state.index + 1} / ${state.questions.length}`;
  $('progressBar').style.width = `${(state.index / state.questions.length) * 100}%`;
  updateTimerForMode(state.currentTimeLimit);
  renderQuestionImage(q.image);

  const choices = q.type === 'truefalse' ? q.options : shuffle(q.options);
  state.currentChoices = choices;
  const box = $('choices');
  box.innerHTML = '';
  choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.type = 'button';

    btn.dataset.answer = text;
    btn.dataset.index = String(i + 1);

    btn.addEventListener('click', () => chooseAnswer(btn));
    box.appendChild(btn);
  });
  prepareQuestionSpace(q.question);
  typeQuestion(q.question, () => {
    enableChoices();
    if(hasTimer()) scheduleCountdown(QUESTION_AFTER_REVEAL_DELAY_MS);
    else state.questionStart = performance.now();

function shouldUseSideImageLayout(layout){
  const w = window.innerWidth || document.documentElement.clientWidth || 0;
  const h = window.innerHeight || document.documentElement.clientHeight || 0;
  return layout === 'portrait' && w >= 720 && h >= 680;
}
function applyResponsiveQuestionImageLayout(wrap){
  if(!wrap || !wrap.classList.contains('has-image')) return false;
  const originalLayout = wrap.dataset.originalImageLayout || wrap.dataset.imageLayout || 'landscape';
  const side = shouldUseSideImageLayout(originalLayout);
  wrap.classList.toggle('layout-side', side);
  wrap.classList.toggle('layout-top', !side);
  wrap.dataset.imageLayout = originalLayout;
  wrap.dataset.effectiveImageLayout = side ? 'side' : 'top';
  return side;
}
function prepareQuestionSpace(text){
  const el = $('questionText');
  const wrap = el ? el.closest('.question-wrap') : null;
  const main = $('quizMain');
  const choicesBox = $('choices');
  if(!el || !wrap || !main) return;

  const fullText = String(text ?? '');
  const compact = document.body.classList.contains('is-compact-height');
  const ultraCompact = document.body.classList.contains('is-ultra-compact-height');
  const hasImage = wrap.classList.contains('has-image');
  const sideImage = hasImage ? applyResponsiveQuestionImageLayout(wrap) : false;
  wrap.classList.remove('is-scrollable');
  wrap.style.removeProperty('--question-max-height');
  wrap.style.removeProperty('--image-max-height');
  wrap.style.removeProperty('--image-column-width');
  el.style.removeProperty('--question-font-size');
  el.style.removeProperty('--question-line-height');

  const wrapRect = wrap.getBoundingClientRect();
  const wrapStyle = getComputedStyle(wrap);
  const padX = (parseFloat(wrapStyle.paddingLeft) || 0) + (parseFloat(wrapStyle.paddingRight) || 0);
  const available = Math.max(140, Math.floor((wrapRect.width || 820) - padX));
  const maxTextWidth = sideImage ? Math.min(520, Math.max(220, Math.floor(available * .54))) : Math.min(780, available);
  const baseStyle = getComputedStyle(el);
  const baseFontRaw = parseFloat(baseStyle.fontSize) || (compact ? 28 : 42);
  const baseFont = hasImage ? Math.min(baseFontRaw, ultraCompact ? 20 : compact ? 23 : 31) : baseFontRaw;
  const minFont = ultraCompact ? 13 : compact ? 14 : 16;
  const lineRatio = ultraCompact ? 1.26 : compact ? 1.3 : 1.35;
  const mainRect = main.getBoundingClientRect();
  const choicesHeight = choicesBox ? Math.ceil(choicesBox.getBoundingClientRect().height || 0) : 0;
  const mainStyle = getComputedStyle(main);
  const gap = parseFloat(mainStyle.rowGap || mainStyle.gap) || (ultraCompact ? 6 : compact ? 10 : 28);
  const maxQuestionSpace = Math.max(ultraCompact ? 92 : compact ? 108 : 132, Math.floor((mainRect.height || 520) - choicesHeight - gap));
  const reserve = ultraCompact ? 8 : compact ? 14 : 22;
  const imageGap = hasImage ? (ultraCompact ? 6 : compact ? 8 : 14) : 0;

  function measure(fontSize){
    const probe = document.createElement('div');
    probe.className = 'question is-complete';
    probe.textContent = fullText || ' ';
    probe.style.position = 'absolute';
    probe.style.left = '-10000px';
    probe.style.top = '-10000px';
    probe.style.visibility = 'hidden';
    probe.style.pointerEvents = 'none';
    probe.style.width = 'fit-content';
    probe.style.maxWidth = `${maxTextWidth}px`;
    probe.style.minHeight = '0';
    probe.style.margin = '0';
    probe.style.fontSize = `${fontSize}px`;
    probe.style.lineHeight = String(lineRatio);
    probe.style.contain = 'layout style';
    document.body.appendChild(probe);
    const rect = probe.getBoundingClientRect();
    const lineHeight = fontSize * lineRatio;
    const textWidth = Math.max(1, Math.ceil(Math.min(rect.width || maxTextWidth, maxTextWidth)));
    const textHeight = Math.max(Math.ceil(lineHeight), Math.ceil(rect.height || lineHeight));
    const lineCount = Math.max(1, Math.round(textHeight / lineHeight));
    probe.remove();
    return {fontSize, lineHeight, textWidth, textHeight, lineCount};
  }

  let imageMax = 0;
  if(hasImage){
    if(sideImage){
      imageMax = Math.max(90, maxQuestionSpace - reserve);
      wrap.style.setProperty('--image-column-width', compact ? '34%' : '38%');
    }else{
      const minImage = ultraCompact ? 56 : compact ? 72 : 100;
      const preferred = Math.floor(maxQuestionSpace * (ultraCompact ? .34 : compact ? .38 : .42));
      const absoluteMax = ultraCompact ? 116 : compact ? 150 : 220;
      imageMax = Math.max(minImage, Math.min(absoluteMax, preferred));
    }
  }

  let best = measure(baseFont);
  function textTargetFor(imgMax){
    if(!hasImage || sideImage) return Math.max(42, maxQuestionSpace - reserve);
    return Math.max(34, maxQuestionSpace - reserve - imgMax - imageGap);
  }
  let targetTextHeight = textTargetFor(imageMax);
  while(hasImage && !sideImage && targetTextHeight < Math.max(34, best.lineHeight * 1.55) && imageMax > (ultraCompact ? 48 : compact ? 60 : 82)){
    imageMax -= ultraCompact ? 8 : 12;
    targetTextHeight = textTargetFor(imageMax);
  }
  while(best.textHeight > targetTextHeight && best.fontSize > minFont){
    const nextFont = Math.max(minFont, best.fontSize - 1.5);
    best = measure(nextFont);
    targetTextHeight = textTargetFor(imageMax);
  }
  while(hasImage && !sideImage && best.textHeight > targetTextHeight && imageMax > (ultraCompact ? 44 : compact ? 56 : 72)){
    imageMax -= ultraCompact ? 8 : 12;
    targetTextHeight = textTargetFor(imageMax);
  }

  const textExtra = Math.max(0, best.lineCount - 1) * (ultraCompact ? 0 : 1.5);
  let questionSpace = best.textHeight + reserve + textExtra;
  if(hasImage && !sideImage) questionSpace += imageMax + imageGap;
  if(hasImage && sideImage) questionSpace = Math.max(questionSpace, Math.min(maxQuestionSpace, imageMax + reserve));
  if(!hasImage) questionSpace = Math.max(questionSpace, ultraCompact ? 72 : compact ? 92 : 120);
  questionSpace = Math.max(questionSpace, ultraCompact ? 86 : compact ? 104 : 128);

  const needsScroll = questionSpace > maxQuestionSpace;
  if(needsScroll){
    questionSpace = maxQuestionSpace;
    wrap.classList.add('is-scrollable');
    if(hasImage && !sideImage){
      const minimumForText = Math.max(32, Math.min(best.textHeight, maxQuestionSpace * .48));
      imageMax = Math.max(44, Math.floor(maxQuestionSpace - reserve - imageGap - minimumForText));
    }
  }

  if(hasImage){
    if(sideImage) imageMax = Math.max(80, Math.min(imageMax, questionSpace - reserve));
    else imageMax = Math.max(44, Math.min(imageMax, Math.max(44, questionSpace - reserve - imageGap - Math.min(best.textHeight, questionSpace * .48))));
    wrap.style.setProperty('--image-max-height', `${Math.ceil(imageMax)}px`);
  }

  el.style.setProperty('--question-font-size', `${best.fontSize}px`);
  el.style.setProperty('--question-line-height', String(lineRatio));
  el.style.setProperty('--question-text-width', `${best.textWidth}px`);
  el.style.setProperty('--question-text-height', `${best.textHeight}px`);
  wrap.style.setProperty('--question-space', `${Math.ceil(questionSpace)}px`);
  wrap.style.setProperty('--question-max-height', `${Math.ceil(questionSpace)}px`);
  if(main) main.style.setProperty('--question-box-height', `${Math.ceil(questionSpace)}px`);
}

function splitGraphemes(text){
  const source = String(text ?? '');
  if(window.Intl && typeof Intl.Segmenter === 'function'){
    try{
      const segmenter = new Intl.Segmenter('ja', {granularity:'grapheme'});
      return Array.from(segmenter.segment(source), item => item.segment);
    }catch(_){/* Array.fromへフォールバック */}
  }
  return Array.from(source);
}
function clearQuestionAnimation(){
  state.typeRunId++;
  pauseQuestionAnimation();
  state.questionReveal = null;
}
function pauseQuestionAnimation(){
  if(state.typeTimerId){
    clearTimeout(state.typeTimerId);
    state.typeTimerId = null;
  }
  if(state.typeFrameId){
    cancelAnimationFrame(state.typeFrameId);
    state.typeFrameId = null;
  }
}
function isQuestionRevealing(){
  return !!(state.questionReveal && !state.questionReveal.completed);
}
function isStudyPanelOpen(){
  const panel = $('studyPanel');
  return !!(panel && !panel.hidden && state.studyAdvanceReady);
}
function canPauseQuiz(){
  return state.screen === 'QUIZ' && (isQuestionRevealing() || !state.locked || isStudyPanelOpen());
}
function resumeQuestionAnimation(){
  const reveal = state.questionReveal;
  if(!reveal || reveal.completed || reveal.runId !== state.typeRunId || state.screen !== 'QUIZ' || state.isPaused) return;
  pauseQuestionAnimation();
  state.typeTimerId = setTimeout(runQuestionRevealStep, QUESTION_CHAR_INTERVAL_MS);
}
function finishQuestionReveal(){
  const reveal = state.questionReveal;
  const el = $('questionText');
  if(!reveal || reveal.completed || reveal.runId !== state.typeRunId || !el) return;
  reveal.completed = true;
  pauseQuestionAnimation();
  reveal.charEls.forEach(span => span.classList.add('is-visible'));
  el.classList.remove('is-typing');
  el.classList.add('is-complete');
  el.setAttribute('aria-label', reveal.fullText);
  el.setAttribute('aria-busy', 'false');
  if(typeof reveal.onComplete === 'function') reveal.onComplete();
}
function runQuestionRevealStep(){
  const reveal = state.questionReveal;
  if(!reveal || reveal.completed || reveal.runId !== state.typeRunId) return;
  state.typeTimerId = null;
  if(state.isPaused || state.screen !== 'QUIZ') return;

  if(reveal.shown < reveal.charEls.length){
    reveal.charEls[reveal.shown].classList.add('is-visible');
    reveal.shown++;
  }

  if(reveal.shown >= reveal.charEls.length){
    finishQuestionReveal();
    return;
  }

  state.typeTimerId = setTimeout(runQuestionRevealStep, QUESTION_CHAR_INTERVAL_MS);
}
function typeQuestion(text, onComplete){
  const el = $('questionText');

  // 古い表示処理が残っていても、新しい問題表示に干渉しないようにする。
  clearQuestionAnimation();
  const runId = state.typeRunId;

  const fullText = String(text ?? '');
  const chars = splitGraphemes(fullText);
  prepareQuestionSpace(fullText);

  el.textContent = '';
  el.classList.remove('is-complete');
  el.classList.add('is-typing');
  el.setAttribute('aria-busy', 'true');
  el.setAttribute('aria-label', fullText);

  const reveal = document.createElement('span');
  reveal.className = 'question-reveal';
  reveal.setAttribute('aria-hidden', 'true');
  const fragment = document.createDocumentFragment();

  chars.forEach((ch) => {
    const span = document.createElement('span');
    span.className = 'question-char';
    span.textContent = ch;
    fragment.appendChild(span);
  });

  reveal.appendChild(fragment);
  el.appendChild(reveal);
  const charEls = Array.from(reveal.querySelectorAll('.question-char'));

  state.questionReveal = {
    runId,
    fullText,
    charEls,
    shown:0,
    completed:false,
    onComplete
  };

  if(chars.length === 0){
    finishQuestionReveal();
    return;
  }

  // 全文を透明状態で先にDOMへ置き、回答ボタンも配置済みにしたうえで表示を始める。
  // 連続RAFで初回ペイントを待つことで、透明な全文配置と1文字目の表示が同じフレームで混ざるのを避ける。
  state.typeFrameId = requestAnimationFrame(() => {
    if(runId !== state.typeRunId || state.isPaused) return;
    state.typeFrameId = requestAnimationFrame(() => {
      if(runId !== state.typeRunId || state.isPaused) return;
      state.typeFrameId = null;
      runQuestionRevealStep();
    });
  });
}

function enableChoices(){
  state.locked = false;
  document.querySelectorAll('.choice').forEach(btn => { btn.disabled = false; });
}

function scheduleCountdown(delayMs){
  clearCountdownDelay();
  state.countdownPending = true;
  state.delayRemainingMs = Math.max(0, delayMs);
  state.delayStartAt = performance.now();
  if(state.delayRemainingMs <= 0){
    beginCountdown();
    return;
  }
  state.timerDelayId = setTimeout(beginCountdown, state.delayRemainingMs);
}

function beginCountdown(){
  clearCountdownDelay(false);
  state.countdownPending = false;
  state.delayRemainingMs = 0;
  state.questionStart = performance.now();
  startTimer();
}

function clearCountdownDelay(adjustRemaining = true){
  if(state.timerDelayId){
    clearTimeout(state.timerDelayId);
    state.timerDelayId = null;
    if(adjustRemaining && state.countdownPending){
      const elapsed = performance.now() - state.delayStartAt;
      state.delayRemainingMs = Math.max(0, state.delayRemainingMs - elapsed);
    }
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
function chooseAnswer(button){
  if(state.locked || state.screen !== 'QUIZ') return;
  state.locked = true;
  stopTimer();
  state.countdownPending = false;
  state.delayRemainingMs = 0;
  const q = state.questions[state.index];
  const picked = button.dataset.answer;
  const isCorrect = picked === q.answer;
  const elapsed = hasTimer() ? Math.max(0, state.currentTimeLimit - state.remaining) : Math.max(0, (performance.now() - state.questionStart) / 1000);
  state.answerTimes.push(elapsed);
  state.answerLog.push({
    no: state.index + 1,
    id: q.id,
    question: q.question,
    picked,
    answer: q.answer,
    correct: isCorrect,
    time: elapsed,
    timeLimit: state.currentTimeLimit,
    category: q.category || '',
    difficulty: q.difficulty || 3,
    explanation: q.explanation || ''
  });
  if(isCorrect) state.correct++;
  markChoices(picked, q.answer, isCorrect);
  showFeedback(isCorrect ? '正解' : '誤り', isCorrect ? 'ok' : 'ng');
  if(isStudyMode()){
    setTimeout(() => {
      hideFeedback();
      showStudyPanel(isCorrect);
    }, STUDY_EXPLANATION_DELAY_MS);
  }else{
    setTimeout(nextQuestion, isCorrect ? 700 : 900);
  }
}
function markChoices(picked, correct, isCorrect){
  document.querySelectorAll('.choice').forEach(btn => {
    const val = btn.dataset.answer;
    btn.disabled = true;
    if(val === correct) btn.classList.add('is-correct');
    else if(val === picked && !isCorrect) btn.classList.add('is-wrong');
    else btn.classList.add('is-dim');
  });
}
function nextQuestion(){
  hideFeedback();
  state.index++;
  if(state.index >= state.questions.length) showResult();
  else showQuestion();
}
function updateTimerView(seconds){
  const remain = Math.max(0, seconds);
  const ratio = Math.max(0, Math.min(1, remain / (state.currentTimeLimit || DEFAULT_TIME_LIMIT)));
  const deg = Math.round(ratio * 360);
  const ring = $('timerRing');
  const color = ratio <= .25 ? 'var(--ng)' : '#222';
  ring.style.background = `conic-gradient(${color} ${deg}deg, #edf0f4 ${deg}deg)`;
  ring.classList.toggle('is-low', ratio <= .25);
  $('timeLabel').textContent = Math.ceil(remain);
}
function startTimer(){
  if(!hasTimer()) return;
  stopTimer();
  state.timerStartedAt = performance.now();
  const startRemaining = state.remaining;
  const tick = (now) => {
    const elapsed = (now - state.timerStartedAt) / 1000;
    state.remaining = Math.max(0, startRemaining - elapsed);
    updateTimerView(state.remaining);
    if(state.remaining <= 0){
      timeUp();
      return;
    }
    state.timerId = requestAnimationFrame(tick);
  };
  state.timerId = requestAnimationFrame(tick);
}
function stopTimer(){
  if(state.timerId){ cancelAnimationFrame(state.timerId); state.timerId = null; }
  clearCountdownDelay(true);
}
function timeUp(){
  if(state.locked) return;
  state.locked = true;
  stopTimer();
  state.countdownPending = false;
  state.delayRemainingMs = 0;
  state.answerTimes.push(state.currentTimeLimit);
  const q = state.questions[state.index];
  state.answerLog.push({
    no: state.index + 1,
    id: q.id,
    question: q.question,
    picked: '時間切れ',
    answer: q.answer,
    correct: false,
    time: state.currentTimeLimit,
    timeLimit: state.currentTimeLimit,
    category: q.category || '',
    difficulty: q.difficulty || 3,
    explanation: q.explanation || ''
  });
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    if(btn.dataset.answer === q.answer) btn.classList.add('is-correct');
    else btn.classList.add('is-dim');
  });
  showFeedback('時間切れ', 'ng');
  setTimeout(nextQuestion, 1000);
}
function pauseGame(){
  if(!canPauseQuiz()) return;
  state.isPaused = true;
  pauseQuestionAnimation();
  stopTimer();
  $('pauseCount').textContent = `${state.index + 1} / ${state.questions.length}`;
  $('pauseTime').textContent = hasTimer() ? `残り ${Math.ceil(state.remaining)} 秒` : '時間制限なし';
  updateSoundButtons();
  changeScreen('PAUSE');
}
function resumeGame(){
  if(state.screen !== 'PAUSE') return;
  state.isPaused = false;
  changeScreen('QUIZ', () => {
    resumeQuestionAnimation();
    if(hasTimer()){
      if(state.countdownPending) scheduleCountdown(state.delayRemainingMs || 0);
      else if(!state.locked) startTimer();
    }
  });
}
function showResult(){
  stopTimer();
  hideStudyPanel();
  const total = state.questions.length;
  const correct = state.correct;
  const rate = total ? Math.round((correct / total) * 100) : 0;
  const playTime = (performance.now() - state.playStart) / 1000;
  const avgAnswer = state.answerTimes.length ? state.answerTimes.reduce((a,b)=>a+b,0)/state.answerTimes.length : 0;
  const modeConfig = getModeConfig();
  const previousRecords = getRecords();
  const previousBest = getBestScore(previousRecords);
  const previousLastScore = previousRecords.length ? Number(previousRecords[previousRecords.length - 1].score) || 0 : null;
  const score = calculateScore(state.answerLog);
  const isFirstRecordedAttempt = modeConfig.record && previousRecords.length === 0;
  const isBestUpdate = modeConfig.record && previousRecords.length > 0 && score > previousBest;
  const theoreticalMax = getTheoreticalMaxScore();
  const isTheoreticalMax = modeConfig.record && score >= theoreticalMax;

  $('progressBar').style.width = '100%';
  $('resultScore').textContent = String(score);
  $('resultCorrect').textContent = `${correct} / ${total}`;
  $('resultRate').textContent = `${rate}%`;
  $('resultTime').textContent = `${playTime.toFixed(1)}秒`;
  $('resultAvg').textContent = `${avgAnswer.toFixed(1)}秒`;
  renderAnswerReview();

  if(modeConfig.record){
    saveLastMissedFromLog();
    const record = {score,total,correct,rate,playTime,avgAnswer,date:new Date().toISOString(),version:VERSION,mode:modeConfig.key};
    const saved = saveRecord(record);
    $('resultBest').textContent = String(getBestScore(saved));
  }else{
    $('resultBest').textContent = '—';
  }

  applyResultHighlights(rate, isBestUpdate, isTheoreticalMax);
  $('resultMessage').textContent = makeResultMessage(rate, {isFirstRecordedAttempt, isBestUpdate, isTheoreticalMax, score, previousLastScore});
  changeScreen('RESULT');
}
function calculateScore(answerLog){
  return answerLog.reduce((sum, item) => {
    if(!item.correct) return sum;
    const limit = Number(item.timeLimit || DEFAULT_TIME_LIMIT);
    const speedBonus = Math.max(0, Math.round((limit - Number(item.time || 0)) * 2));
    return sum + 100 + speedBonus;
  }, 0);
}
function getTheoreticalMaxScore(){
  return state.questions.reduce((sum, q) => sum + 100 + (Number(q.timeLimit || DEFAULT_TIME_LIMIT) * 2), 0);
}
function applyResultHighlights(rate, isBestUpdate, isTheoreticalMax){
  const scoreCard = $('resultScore').closest('.result-card');
  const correctCard = $('resultCorrect').closest('.result-card');
  [scoreCard, correctCard].forEach(card => card.classList.remove('is-best','is-theoretical','is-good','is-perfect'));

  if(isTheoreticalMax) scoreCard.classList.add('is-theoretical');
  else if(isBestUpdate) scoreCard.classList.add('is-best');
  if(rate === 100) correctCard.classList.add('is-perfect');
  else if(rate >= 80) correctCard.classList.add('is-good');
}
function makeResultMessage(rate, context = {}){
  const {isFirstRecordedAttempt, isBestUpdate, isTheoreticalMax, score, previousLastScore} = context;
  if(state.mode === 'training') return '訓練を終えました。解説を手がかりに、理解の穴を小さくできます。';
  if(state.mode === 'review') return rate === 100 ? '復習対象を確認できました。次の挑戦で定着を確かめましょう。' : '復習対象がまだ残っています。短く確認してから、もう一度試すと定着しやすくなります。';

  if(isFirstRecordedAttempt){
    if(isTheoreticalMax || rate === 100) return '初回から全問正解です。次はこの精度を保ちながら、迷いの少ない回答を目指しましょう。';
    if(rate >= 80) return '初回として良い滑り出しです。間違えた箇所を確認すると、次の挑戦で伸びが見えます。';
    if(rate >= 50) return '初回の記録が基準になります。正解できた問題を土台に、復習対象を絞っていきましょう。';
    return '初回で復習対象が明確になりました。まずは間違えた問題だけを軽く確認しましょう。';
  }

  if(isTheoreticalMax) return '限界点に到達しました。次はこの精度を再現できるかを確かめましょう。';
  if(rate === 100 && isBestUpdate) return '全問正解で記録更新です。精度と速度の両方が噛み合っています。';
  if(isBestUpdate) return 'ベストスコア更新です。これまでの基準を一段上げました。';
  if(previousLastScore !== null && score > previousLastScore) return '前回よりスコアが伸びています。残った箇所を確認すると、さらに安定します。';
  if(rate === 100) return '全問正解です。次は速度を落とさずに再現できるかを確認しましょう。';
  if(rate >= 80) return '高い正答率です。誤答した問題を短く確認すると、次の挑戦につながります。';
  if(rate >= 50) return '正解できた問題もあります。迷った箇所を切り分けると、次の伸びしろが見えます。';
  return '復習対象が明確になりました。焦らず、取れる問題を一つずつ増やしましょう。';
}

function renderAnswerReview(){
  const list = $('reviewList');
  if(!list) return;
  list.innerHTML = state.answerLog.map(item => {
    const markClass = item.correct ? 'ok' : 'ng';
    const mark = item.correct ? '○' : '×';
    const pickedText = item.picked === '時間切れ' ? '時間切れ' : `あなた：${escapeHtml(item.picked)}`;
    const meta = [
      item.category ? `<span class="review-pill">${escapeHtml(item.category)}</span>` : '',
      item.difficulty ? `<span class="review-pill">難易度 ${escapeHtml(item.difficulty)}</span>` : '',
      item.timeLimit ? `<span class="review-pill">制限 ${escapeHtml(item.timeLimit)}秒</span>` : ''
    ].filter(Boolean).join('');
    const explanation = item.explanation ? `
      <details class="review-explanation">
        <summary>解説を見る</summary>
        <div class="review-explanation-body">${escapeHtml(item.explanation)}</div>
      </details>
    ` : '';
    return `
      <div class="review-item">
        <div class="review-mark ${markClass}">${mark}</div>
        <div class="review-main">
          <div class="review-question">${item.no}. ${escapeHtml(item.question)}</div>
          <div class="review-answer">${pickedText} ／ 正解：${escapeHtml(item.answer)}</div>
          ${meta ? `<div class="review-meta">${meta}</div>` : ''}
        </div>
        <div class="review-time">${Number(item.time).toFixed(1)}秒</div>
        ${explanation}
      </div>
    `;
  }).join('');
  const details = $('answerReview');
  if(details) details.open = false;
}
function getRecords(){
  try{
    const current = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return Array.isArray(current) ? current : [];
  }catch(e){ console.warn('LocalStorage read failed', e); }
  return [];
}
function saveRecord(record){
  const records = getRecords();
  records.push(record);
  const trimmed = records.slice(-100);
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); }
  catch(e){ console.warn('LocalStorage save failed', e); }
  return trimmed;
}
function getBestScore(records){
  return records.length ? Math.max(...records.map(r => Number(r.score) || 0)) : 0;
}
function setRecordNotice(message = '', type = ''){
  const el = $('recordNotice');
  if(!el) return;
  el.textContent = message;
  el.className = `record-notice${type ? ` is-${type}` : ''}`;
}
function disarmRecordReset(clearNotice = true){
  if(state.recordResetTimerId){
    clearTimeout(state.recordResetTimerId);
    state.recordResetTimerId = null;
  }
  state.recordResetArmed = false;
  const btn = $('resetRecordBtn');
  if(btn){
    btn.textContent = '記録をリセット';
    btn.classList.remove('is-confirming');
  }
  if(clearNotice) setRecordNotice('');
}
function disarmAllRecordsReset(clearNotice = true){
  if(state.allRecordsResetTimerId){
    clearTimeout(state.allRecordsResetTimerId);
    state.allRecordsResetTimerId = null;
  }
  state.allRecordsResetArmed = false;
  const btn = $('resetAllRecordsBtn');
  if(btn){
    btn.textContent = 'すべての記録をリセット';
    btn.classList.remove('is-confirming');
  }
  if(clearNotice) setRecordNotice('');
}
function armRecordReset(){
  disarmAllRecordsReset(false);
  state.recordResetArmed = true;
  const btn = $('resetRecordBtn');
  if(btn){
    btn.textContent = 'もう一度押してリセット';
    btn.classList.add('is-confirming');
  }
  setRecordNotice('もう一度押すと、このクイズの記録を完全に削除します。', 'alert');
  if(state.recordResetTimerId) clearTimeout(state.recordResetTimerId);
  state.recordResetTimerId = setTimeout(() => {
    disarmRecordReset(false);
    setRecordNotice('リセット操作を取り消しました。');
  }, 4500);
}
function armAllRecordsReset(){
  disarmRecordReset(false);
  state.allRecordsResetArmed = true;
  const btn = $('resetAllRecordsBtn');
  if(btn){
    btn.textContent = 'もう一度押すと全削除';
    btn.classList.add('is-confirming');
  }
  setRecordNotice('他のクイズの記録もすべて完全に削除します。もう一度押すと実行します。', 'alert');
  if(state.allRecordsResetTimerId) clearTimeout(state.allRecordsResetTimerId);
  state.allRecordsResetTimerId = setTimeout(() => {
    disarmAllRecordsReset(false);
    setRecordNotice('全記録リセット操作を取り消しました。');
  }, 6500);
}
function getAllRecordStorageKeys(){
  const keys = [];
  try{
    for(let i=0; i<localStorage.length; i++){
      const key = localStorage.key(i);
      if(!key) continue;
      const isScopedRecord = key.startsWith(STORAGE_RECORD_PREFIX) || key.startsWith(STORAGE_MISSED_PREFIX);
      const isLegacyRecord = LEGACY_RECORD_KEY_PREFIXES.some(prefix => key.startsWith(prefix));
      if(isScopedRecord || isLegacyRecord) keys.push(key);
    }
  }catch(e){
    console.warn('LocalStorage scan failed', e);
  }
  return keys;
}
function showRecordScreen(message = '', type = ''){
  stopTimer();
  hideFeedback();
  disarmRecordReset(false);
  disarmAllRecordsReset(false);
  const records = getRecords();
  const list = $('recordList');
  if(!records.length){
    list.innerHTML = '<div class="empty-record">まだ成績がありません。</div>';
  }else{
    const plays = records.length;
    const best = getBestScore(records);
    const avgRate = Math.round(records.reduce((a,r)=>a+(Number(r.rate)||0),0) / plays);
    const avgAnswer = records.reduce((a,r)=>a+(Number(r.avgAnswer)||0),0) / plays;
    const last = new Date(records[records.length-1].date).toLocaleString('ja-JP');
    list.innerHTML = `
      <div class="record-row"><strong>${plays}回</strong><span>プレイ回数</span></div>
      <div class="record-row"><strong>${best}</strong><span>ベストスコア</span></div>
      <div class="record-row"><strong>${avgRate}%</strong><span>平均正答率</span></div>
      <div class="record-row"><strong>${avgAnswer.toFixed(1)}秒</strong><span>平均回答時間</span></div>
      <div class="record-meta-note">最終プレイ：${escapeHtml(last)}</div>
    `;
  }
  setRecordNotice(message, type);
  changeScreen('RECORD');
}
function clearRecords(){
  const records = getRecords();
  let hasMissedRecord = false;
  try{ hasMissedRecord = localStorage.getItem(LAST_MISSED_KEY) !== null; }
  catch(e){ console.warn('LocalStorage missed check failed', e); }
  if(!records.length && !hasMissedRecord){
    disarmRecordReset(false);
    disarmAllRecordsReset(false);
    setRecordNotice('削除できる記録はありません。');
    return;
  }
  if(!state.recordResetArmed){
    armRecordReset();
    return;
  }
  disarmRecordReset(false);
  try{
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(LAST_MISSED_KEY);
  }catch(e){ console.warn('LocalStorage clear failed', e); }
  showRecordScreen('このクイズの記録をリセットしました。', 'done');
}
function clearAllRecords(){
  const keys = getAllRecordStorageKeys();
  if(!keys.length){
    disarmAllRecordsReset(false);
    disarmRecordReset(false);
    setRecordNotice('削除できるクイズ記録はありません。');
    return;
  }
  if(!state.allRecordsResetArmed){
    armAllRecordsReset();
    return;
  }
  disarmAllRecordsReset(false);
  try{
    keys.forEach(key => localStorage.removeItem(key));
  }catch(e){ console.warn('LocalStorage clear all failed', e); }
  showRecordScreen('すべてのクイズ記録をリセットしました。', 'done');
}

function showFeedback(text, type){
  if(type === 'ok') playCorrectSound();
  if(type === 'ng') playWrongSound();
  const el = $('feedback');
  el.textContent = text;
  el.className = `feedback ${type} is-show`;
}
function hideFeedback(){ $('feedback').className = 'feedback'; }
function showHintOnce(){
  // キー割り当ては画面上に出しすぎず、操作の中で自然に気付ける設計にする。
}
function quitToStart(){
  stopTimer();
  clearQuestionAnimation();
  clearCountdownDelay(false);
  state.countdownPending = false;
  state.isPaused = false;
  state.questionReveal = null;
  disarmRecordReset();
  disarmAllRecordsReset();
  setStartNotice('');
  $('questionText').classList.remove('is-typing', 'is-complete');
  resetQuestionImage();
  hideFeedback();
  changeScreen('START');
}
function handleKey(e){
  if(e.isComposing || e.altKey || e.ctrlKey || e.metaKey) return;

  if(e.key === 'Escape'){
    // ブラウザの全画面解除は完全には抑止できないが、アプリ側では既定動作を抑制して干渉を軽減する。
    e.preventDefault();
    e.stopPropagation();
    if(state.screen === 'QUIZ') pauseGame();
    else if(state.screen === 'PAUSE') resumeGame();
    return;
  }

  if(!['1','2','3','4','5','6'].includes(e.key) || e.repeat) return;

  if(state.screen === 'QUIZ'){
    if(['1','2','3','4'].includes(e.key) && advanceFromStudyPanel()){
      e.preventDefault();
      return;
    }
    if(state.locked) return;
    if(!['1','2','3','4'].includes(e.key)) return;
    const index = Number(e.key);
    const btn = document.querySelector(`.choice[data-index="${index}"]`);
    if(btn) btn.click();
    return;
  }

  const activeScreen = screens[state.screen];
  if(!activeScreen) return;
  const actionButton = activeScreen.querySelector(`button[data-key="${e.key}"]`);
  if(actionButton && !actionButton.disabled) actionButton.click();
}
function pulseButton(button){
  button.classList.remove('is-pressed');
  void button.offsetWidth;
  button.classList.add('is-pressed');
  setTimeout(() => button.classList.remove('is-pressed'), 280);
}

$('gameTitle').textContent = TITLE_FROM_FILE;
$('quizAuthor').textContent = `クイズ作成：${QUIZ_AUTHOR || '匿名'}`;
$('startBtn').addEventListener('click', () => startGame('challenge'));
$('trainingBtn').addEventListener('click', () => startGame('training'));
$('reviewModeBtn').addEventListener('click', () => startGame('review'));
$('recordBtn').addEventListener('click', () => showRecordScreen());
$('startSoundBtn').addEventListener('click', toggleSound);
$('startFullscreenBtn').addEventListener('click', toggleFullscreen);
$('pauseBtn').addEventListener('click', pauseGame);
$('pauseSoundBtn').addEventListener('click', toggleSound);
$('resumeBtn').addEventListener('click', resumeGame);
$('retryFromPauseBtn').addEventListener('click', () => startGame(state.mode));
$('quitFromPauseBtn').addEventListener('click', quitToStart);
$('retryBtn').addEventListener('click', () => startGame(state.mode));
$('quitBtn').addEventListener('click', quitToStart);
$('backFromRecordBtn').addEventListener('click', quitToStart);
$('resetRecordBtn').addEventListener('click', clearRecords);
$('resetAllRecordsBtn').addEventListener('click', clearAllRecords);
$('studyPanel').addEventListener('click', advanceFromStudyPanel);
$('studyPanel').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' || e.key === ' '){
    e.preventDefault();
    advanceFromStudyPanel();
  }
});
document.addEventListener('click', (e) => {
  const button = e.target.closest('button');
  if(button && !button.disabled){
    pulseButton(button);
    if(button.id !== 'startSoundBtn' && button.id !== 'pauseSoundBtn') playClickSound();
  }
}, true);
window.addEventListener('resize', updateViewportClass);
window.addEventListener('orientationchange', updateViewportClass);
document.addEventListener('fullscreenchange', updateFullscreenButtons);
document.addEventListener('webkitfullscreenchange', updateFullscreenButtons);
document.addEventListener('keydown', handleKey, {capture:true});
updateSoundButtons();
updateFullscreenButtons();
updateViewportClass();
</script>
