<!DOCTYPE html>
<!-- 開発：丹羽隆一郎 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズエディタ v1.2.2</title>
<style>
/*
  Quiz Editor
  Version : 1.2.2
  Concept : 表計算ソフトの操作感を意識した、静かなクイズ生成ツール

  CHANGELOG
  1.2.2
  - 出力プレイヤーを v1.2.2 に更新
  - リザルト画面で正誤フィードバックが再表示される可能性を抑止
  - クイズ作成者表記を全画面ボタン直下へ移動

  1.2.1
  - 画像付き問題の表示領域を再調整
  - 狭い縦長画面では縦長画像も上下表示に自動切替
  - クイズ作成者表記を初期画面下部へ移動

  1.2.0
  - 1問1画像の添付に対応
  - 画像取り込み時にWebP変換・簡易クロップを行うダイアログを追加
  - 画像情報はプロジェクトファイルと生成HTMLに保持し、CSV/TSVには含めない

  1.1.0
  - ポーズ対象を問題表示中・解説表示中へ拡大
  - 正誤フィードバック演出を追加し、「不正解」を「誤り」へ変更
  - クイズ作成者名入力欄と生成HTML内の作成者表記を追加

  1.0.0
  - 出力プレイヤーを v1.0.0 に更新
  - 難易度・制限時間の全角数字を自動で半角へ正規化
  - 制限時間 600 秒までの入力を許容

  0.7.0
  - 出力プレイヤーを v0.5.0 に更新
  - 生成HTMLでも挑戦・訓練・復習の3モード、クイズ別成績保存、全記録リセットを利用できるように更新
  - 生成HTMLの保存キー指定を廃止し、プレイヤー側のクイズ内容別自動生成に統一

  0.6.7
  - Shift+Enterで現在セルの1行上へ移動するように修正

  0.6.6
  - 出力プレイヤーを v0.3.2 に更新
  - 生成HTMLの検証処理を強化し、埋め込み後のタイトル・quizData・プレイヤーバージョンを確認
  - プレイヤーバージョン定数を整理し、プロジェクト保存とHTML生成の表記ずれを抑制

  0.6.5
  - 出力プレイヤーを v0.3.0 に更新
  - 生成 quizData の項目順を question / answer / options / explanation / timeLimit / category / difficulty に整理
  - エディター側プレビュー・検証でも Yes/No 系の○×表記揺れを扱えるように調整

  0.6.4
  - 生成メニュー内のコピー項目を「HTML全文をコピー」に明確化
  - HTML生成・コピー前に軽量な生成中表示を追加
  - プレビュー格納状態をブラウザに記憶し、再表示時の負担を軽減
  - 行番号列をさらに少し圧縮

  0.6.3
  - 生成操作を「生成」ボタン配下のメニューに整理し、HTMLファイル生成とHTML全文コピーを選択できるように変更
  - 生成ボタンを目立つ主操作として調整
  - 行番号左側の余白を縮小し、表の視覚密度を改善

  0.6.2
  - 検索をブラウザ標準ダイアログから、必要時だけ表示する小型検索バーに変更
  - 検索結果件数と現在位置を表示し、Enter / Shift+Enterで次/前へ移動できるように調整
  - メニュー項目にショートカット表示を追加し、操作の見通しを改善

  0.6.1
  - プレビュー格納ボタンの矢印方向と配置を調整
  - 検索語の保持とCSV/TSV読込通知を微調整

  0.6.0
  - 上部操作をメニュー型に整理し、画面上のボタン増加を抑制
  - CSV/TSVファイルの読み込み・書き出しに対応
  - 右クリックのコンテキストメニューを追加
  - 検索、空行詰め、行移動をメニュー内の軽量操作として追加
  - 表示メニューを廃止し、プレビューエリア内の1ボタンで展開/格納できるように調整

  0.5.0
  - 編集用プロジェクトファイル（.quiz.json）の保存に対応
  - .quiz.jsonの読み込みに対応し、タイトルと表の内容を復元できるように変更
  - 読み込み時、入力中の内容がある場合は上書き確認を表示
  - 配布用HTMLと編集用プロジェクトを分けて管理できるように整理

  0.4.0
  - 生成前サマリーを追加し、クリックで折りたたみ/展開できるように変更
  - 出力ファイル名、問題種別数、難易度内訳、解説あり問題数を集計表示
  - 生成後トーストを強化し、出力プレイヤー表記は含めない形に整理
  - 生成HTMLの埋め込みデータ確認処理を追加

  0.3.4
  - 問題一覧の右側に「元に戻す」「やり直す」ボタンを追加
  - 表・タイトルの編集履歴を最大40件まで保持
  - Ctrl/Cmd+Z、Ctrl/Cmd+Y、Cmd+Shift+Zのショートカットに対応
  - 入力中の履歴保存は短い遅延を入れ、動作が重くなりにくいよう調整

  0.3.3
  - セル範囲選択を追加（クリック→Shift+クリックで範囲選択）
  - 行単位選択を追加（行番号クリック、Shift+行番号クリック）
  - Ctrl/Cmd+Cで選択範囲・選択行をTSVとしてコピーできるように変更
  - 選択範囲への貼り付け開始位置を、選択範囲左上または選択行先頭に調整
  - Delete/Backspaceで選択範囲・選択行をクリアできるように変更

  0.3.2
  - タイトル未入力時の見落とし防止として、エラー0件かつタイトル未入力の場合にタイトル欄を強調
  - 複数選択・コピー機能の実装検討用として内部バージョンを更新

  0.3.1
  - 行クリアボタンを追加
  - 説明文と表サイズ表記を削除して視覚情報を整理
  - プレビューを選択行連動に変更
  - プレビュー表示/非表示切替を追加し、非表示時はプレビュー処理を停止
  - バージョン表記を「出力プレイヤー v0.2.0」に整理

  0.3.0
  - 100行の表入力エディタを実装
  - Excel / Googleスプレッドシートからの貼り付けに対応
  - 空欄セル / 入力済みセル / 選択中セルを視覚的に区別
  - 正解 / オプション1〜3を、プレイヤーUIに合わせた淡い色で区別
  - 選択肢重複、必須項目、難易度、制限時間のチェックを実装
  - 表の順番通りのプレビューを実装
  - タイトル必須、配布用HTML生成に対応
*/

:root{
  --font-main:"Noto Sans JP","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;
  --bg:#f8f9fb;
  --surface:#ffffff;
  --surface-soft:#fbfcfd;
  --text:#222426;
  --muted:#6f7782;
  --line:#dde3ea;
  --line-strong:#c9d2dc;
  --focus:#f2a65a;
  --danger:#ef5350;
  --danger-soft:#fff1f1;
  --warning:#ffca28;
  --warning-soft:#fff8df;
  --ok:#66bb6a;
  --ok-soft:#edf8ee;
  --choice-red:#ef5350;
  --choice-red-soft:#fff3f3;
  --choice-blue:#42a5f5;
  --choice-blue-soft:#f0f7ff;
  --choice-yellow:#ffca28;
  --choice-yellow-soft:#fff9e6;
  --choice-green:#66bb6a;
  --choice-green-soft:#f0fbf2;
  --shadow:0 18px 45px rgba(31,45,61,.08);
  --transition-fast:120ms ease;
  --transition-normal:180ms ease;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:linear-gradient(180deg,#fbfcfd 0%,var(--bg) 100%);
  color:var(--text);
  font-family:var(--font-main);
  line-height:1.6;
  overflow:hidden;
}
button,input,textarea{font:inherit;}
button{
  appearance:none;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--text);
  border-radius:14px;
  padding:.72rem 1rem;
  cursor:pointer;
  transition:transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast), opacity var(--transition-fast);
}
button:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 10px 24px rgba(31,45,61,.08);
  border-color:var(--line-strong);
}
button:active:not(:disabled){transform:translateY(1px) scale(.99);}
button:disabled{opacity:.45; cursor:not-allowed;}
button.primary{
  background:#222426;
  color:#fff;
  border-color:#222426;
}
button.primary.generate-button{
  min-width:86px;
  padding:.78rem 1.14rem;
  font-weight:800;
  letter-spacing:.08em;
  background:linear-gradient(180deg,#f2a65a,#d78325);
  border-color:#d78325;
  box-shadow:0 12px 26px rgba(216,128,29,.24);
}
button.primary.generate-button:hover:not(:disabled){
  border-color:#c67518;
  box-shadow:0 14px 30px rgba(216,128,29,.30);
}
.generate-group .menu-list{min-width:218px;}
button.soft{background:#f5f7fa;}
button.danger{color:#a92323; border-color:#f0b7b7; background:#fff7f7;}

.app{
  height:100%;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:0;
}
.header{
  padding:18px clamp(16px,3vw,30px) 14px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(12px);
  z-index:5;
}
.header-main{
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:start;
}
.brand-title{margin:0; font-size:clamp(1.35rem,2.4vw,2rem); letter-spacing:.02em;}
.brand-copy{margin:.2rem 0 0; color:var(--muted); font-size:.94rem;}
.version{color:var(--muted); font-size:.82rem; text-align:right; white-space:nowrap;}
.toolbar{
  margin-top:14px;
  display:grid;
  grid-template-columns:minmax(360px,1fr) auto;
  gap:12px;
  align-items:center;
}
.meta-fields{display:grid;grid-template-columns:minmax(220px,1fr) minmax(160px,260px);gap:12px;align-items:end;}
.title-field{display:grid; gap:5px;}
.title-field label{font-size:.78rem; color:var(--muted);}
#quizTitle{
  width:100%;
  border:1px solid var(--line);
  background:var(--surface);
  border-radius:14px;
  padding:.74rem .9rem;
  outline:none;
  transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
}
#quizTitle:focus{
  border-color:var(--focus);
  box-shadow:0 0 0 4px rgba(242,166,90,.18);
}

#quizTitle.needs-title{
  border-color:var(--warning);
  background:linear-gradient(90deg,var(--warning-soft),#fff 72%);
  box-shadow:0 0 0 4px rgba(255,202,40,.18);
}
#quizAuthor{
  width:100%;
  border:1px solid var(--line);
  background:var(--surface);
  border-radius:14px;
  padding:.74rem .9rem;
  outline:none;
  transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
}
#quizAuthor:focus{
  border-color:var(--focus);
  box-shadow:0 0 0 4px rgba(242,166,90,.18);
}
.title-field.is-title-needed label{
  color:#7a5d00;
  font-weight:700;
}
.actions{display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; align-items:center;}
.menu-group{position:relative;}
.menu-button{background:#f5f7fa; min-width:86px;}
.menu-list{
  position:absolute;
  right:0; top:calc(100% + 6px);
  min-width:190px;
  display:none;
  padding:6px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  box-shadow:0 18px 40px rgba(31,45,61,.16);
  z-index:20;
}
.menu-group.is-open .menu-list{display:grid; gap:4px;}
.menu-item{
  width:100%;
  border:0;
  border-radius:10px;
  padding:.56rem .65rem;
  background:transparent;
  box-shadow:none;
  text-align:left;
  font-size:.88rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
}
.menu-label{min-width:0;}
.menu-shortcut{
  color:var(--muted);
  font-size:.76rem;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.menu-item:hover:not(:disabled){transform:none; box-shadow:none; background:#f5f7fa;}
.menu-separator{height:1px; background:var(--line); margin:4px;}
.context-menu{
  position:fixed;
  min-width:190px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  box-shadow:0 18px 40px rgba(31,45,61,.18);
  z-index:30;
}
.context-menu[hidden]{display:none;}
.context-menu .menu-item{font-size:.86rem;}
.status-row{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
.badge{
  border:1px solid var(--line);
  background:var(--surface-soft);
  color:var(--muted);
  border-radius:999px;
  padding:.35rem .65rem;
  font-size:.82rem;
}
.badge.good{background:var(--ok-soft); color:#2d6b31; border-color:#c8e6c9;}
.badge.bad{background:var(--danger-soft); color:#963434; border-color:#f4c6c6;}
.badge.warn{background:var(--warning-soft); color:#7a5d00; border-color:#ffe39a;}
.find-panel{
  margin-top:10px;
  display:grid;
  grid-template-columns:auto minmax(180px,360px) auto auto auto;
  gap:8px;
  align-items:center;
  padding:8px;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.72);
}
.find-panel[hidden]{display:none;}
.find-panel label{font-size:.78rem; color:var(--muted); font-weight:700;}
.find-panel input{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:.55rem .7rem;
  outline:none;
}
.find-panel input:focus{border-color:var(--focus); box-shadow:0 0 0 3px rgba(242,166,90,.16);}
.find-count{color:var(--muted); font-size:.82rem; white-space:nowrap;}
.find-panel button{padding:.48rem .62rem; font-size:.82rem; background:#f7f8fa;}

.summary-panel{
  margin-top:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.58);
  border-radius:16px;
  overflow:hidden;
  transition:border-color var(--transition-fast), background var(--transition-fast);
}
.summary-panel:hover{border-color:#d8e0e8; background:rgba(255,255,255,.8);}
.summary-header{
  width:100%;
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:10px;
  border:0;
  box-shadow:none;
  border-radius:0;
  background:transparent;
  padding:.72rem .9rem;
  text-align:left;
  color:var(--text);
}
.summary-header:hover{transform:none; box-shadow:none; background:rgba(248,249,251,.78);}
.summary-title{font-weight:800; font-size:.92rem;}
.summary-brief{
  color:var(--muted);
  font-size:.84rem;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.summary-icon{
  color:var(--muted);
  font-size:.78rem;
  border:1px solid var(--line);
  background:var(--surface-soft);
  border-radius:999px;
  padding:.2rem .48rem;
}
.summary-body{
  border-top:1px solid var(--line);
  padding:.85rem .9rem .95rem;
}
.summary-panel.is-collapsed .summary-body{display:none;}
.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(140px,1fr));
  gap:8px;
}
.summary-item{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:.65rem .75rem;
  min-width:0;
}
.summary-item span{
  display:block;
  color:var(--muted);
  font-size:.75rem;
  margin-bottom:.22rem;
}
.summary-item strong{
  display:block;
  color:var(--text);
  font-size:.92rem;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.summary-item.is-good strong{color:#2d6b31;}
.summary-item.is-warn strong{color:#7a5d00;}

.feedback-sample-panel{
  margin-top:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.58);
  border-radius:16px;
  overflow:hidden;
}
.feedback-sample-panel summary{
  cursor:pointer;
  padding:.72rem .9rem;
  font-weight:800;
  list-style:none;
  color:var(--text);
}
.feedback-sample-panel summary::-webkit-details-marker{display:none;}
.feedback-sample-body{
  border-top:1px solid var(--line);
  padding:.85rem .9rem .95rem;
  display:grid;
  grid-template-columns:minmax(150px,210px) minmax(0,1fr);
  gap:12px;
  align-items:start;
}
.feedback-sample-preview{
  min-width:120px;
  justify-self:start;
  border-radius:999px;
  padding:.62rem 1rem;
  background:#222426;
  color:#fff;
  font-weight:900;
  text-align:center;
  box-shadow:0 12px 28px rgba(31,45,61,.12);
}
.feedback-sample-preview.correct{background:rgba(47,179,101,.92);}
.feedback-sample-preview.wrong{background:rgba(227,80,80,.92);}
.feedback-sample-buttons{display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:8px;}
.feedback-sample-buttons button{padding:.54rem .68rem;border-radius:12px;background:#f7f8fa;font-size:.82rem;text-align:left;}
.feedback-sample-preview.sample-correct-bounce{animation:sampleCorrectBounce 360ms cubic-bezier(.18,1.28,.35,1) both;}
.feedback-sample-preview.sample-correct-pop{animation:sampleCorrectPop 300ms ease-out both;}
.feedback-sample-preview.sample-correct-float{animation:sampleCorrectFloat 420ms ease both;}
.feedback-sample-preview.sample-correct-pulse{animation:sampleCorrectPulse 440ms ease both;}
.feedback-sample-preview.sample-wrong-shake{animation:sampleWrongShake 320ms ease both;}
.feedback-sample-preview.sample-wrong-sink{animation:sampleWrongSink 340ms ease both;}
.feedback-sample-preview.sample-wrong-tilt{animation:sampleWrongTilt 360ms ease both;}
.feedback-sample-preview.sample-wrong-catch{animation:sampleWrongCatch 360ms ease both;}
@keyframes sampleCorrectBounce{0%{transform:scale(.86,1.12);opacity:.35}45%{transform:scale(1.08,.94);opacity:1}72%{transform:scale(.98,1.03)}100%{transform:scale(1)}}
@keyframes sampleCorrectPop{0%{transform:scale(.82);opacity:.35}62%{transform:scale(1.07);opacity:1}100%{transform:scale(1)}}
@keyframes sampleCorrectFloat{0%{transform:translateY(6px);opacity:.35}55%{transform:translateY(-5px);opacity:1}100%{transform:translateY(0)}}
@keyframes sampleCorrectPulse{0%{transform:scale(.96);box-shadow:0 0 0 0 rgba(47,179,101,.22)}55%{transform:scale(1.03);box-shadow:0 0 0 8px rgba(47,179,101,.12)}100%{transform:scale(1);box-shadow:0 12px 28px rgba(31,45,61,.12)}}
@keyframes sampleWrongShake{0%{transform:translateX(0);opacity:.35}18%{transform:translateX(-7px);opacity:1}36%{transform:translateX(6px)}54%{transform:translateX(-4px)}72%{transform:translateX(2px)}100%{transform:translateX(0)}}
@keyframes sampleWrongSink{0%{transform:translateY(0);opacity:.35}35%{transform:translateY(6px);opacity:1}70%{transform:translateY(2px)}100%{transform:translateY(0)}}
@keyframes sampleWrongTilt{0%{transform:rotate(0deg);opacity:.35}25%{transform:rotate(-2.2deg);opacity:1}50%{transform:rotate(1.8deg)}75%{transform:rotate(-.8deg)}100%{transform:rotate(0deg)}}
@keyframes sampleWrongCatch{0%{transform:scale(1);opacity:.35}30%{transform:scale(.94,1.04);opacity:1}60%{transform:scale(1.02,.98)}100%{transform:scale(1)}}


.workarea{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(300px,390px);
  gap:18px;
  padding:18px clamp(16px,3vw,30px) 22px;
}
.workarea.is-preview-collapsed{grid-template-columns:minmax(0,1fr) 54px;}
.panel{
  min-height:0;
  border:1px solid var(--line);
  background:rgba(255,255,255,.9);
  border-radius:22px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
}
.panel-header h2{margin:0; font-size:1rem;}
.panel-tools{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.panel-tools button{
  padding:.48rem .7rem;
  border-radius:12px;
  font-size:.84rem;
  background:#f7f8fa;
}
.panel-tools button:not(:disabled):hover{background:#fff;}
.panel-hint{color:var(--muted); font-size:.82rem;}
.table-panel{display:grid; grid-template-rows:auto 1fr;}
.table-wrap{
  min-height:0;
  overflow:auto;
  overscroll-behavior:contain;
  background:#fff;
}
table.editor-grid{
  border-collapse:separate;
  border-spacing:0;
  min-width:1430px;
  width:100%;
  table-layout:fixed;
  font-size:.9rem;
}
.editor-grid th,.editor-grid td{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.editor-grid thead th{
  position:sticky;
  top:0;
  z-index:3;
  background:#f3f6f9;
  color:#4d5965;
  font-weight:700;
  padding:.55rem .5rem;
  text-align:left;
}
.editor-grid .row-head{
  position:sticky;
  left:0;
  z-index:2;
  width:46px;
  background:#f3f6f9;
  color:#7b8490;
  text-align:right;
  padding:.28rem .22rem;
  font-variant-numeric:tabular-nums;
}
.row-head-content{
  position:relative;
  min-height:20px;
}
.row-clear{
  position:absolute;
  left:0;
  top:50%;
  width:16px;
  height:16px;
  min-width:16px;
  border-radius:999px;
  padding:0;
  border:1px solid transparent;
  background:transparent;
  color:transparent;
  box-shadow:none;
  font-size:.68rem;
  font-weight:800;
  line-height:1;
  transform:translateY(-50%);
}
.editor-grid tbody tr:hover .row-clear,
.row-clear:focus{
  color:#9d3434;
  background:#fff7f7;
  border-color:#efc1c1;
}
.row-clear:hover:not(:disabled){
  transform:translateY(-50%) scale(1.04);
  box-shadow:none;
}
.row-clear:active:not(:disabled){transform:translateY(-50%) scale(.96);}
.editor-grid thead .row-head{z-index:4;}
.editor-grid td{
  position:relative;
  height:38px;
  min-height:38px;
  padding:.38rem .5rem;
  vertical-align:top;
  outline:none;
  background:#fff;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}
.editor-grid td.is-empty{background:#fafbfc;}
.editor-grid td.is-filled{background:#fff;}
.editor-grid td.col-answer.is-filled{background:linear-gradient(90deg,var(--choice-red-soft),#fff 46%);}
.editor-grid td.col-option1.is-filled{background:linear-gradient(90deg,var(--choice-blue-soft),#fff 46%);}
.editor-grid td.col-option2.is-filled{background:linear-gradient(90deg,var(--choice-yellow-soft),#fff 46%);}
.editor-grid td.col-option3.is-filled{background:linear-gradient(90deg,var(--choice-green-soft),#fff 46%);}
.editor-grid td.col-answer.is-filled::before,
.editor-grid td.col-option1.is-filled::before,
.editor-grid td.col-option2.is-filled::before,
.editor-grid td.col-option3.is-filled::before{
  content:"";
  position:absolute;
  left:0; top:0; bottom:0;
  width:4px;
  border-radius:0 4px 4px 0;
}
.editor-grid td.col-answer.is-filled::before{background:var(--choice-red);}
.editor-grid td.col-option1.is-filled::before{background:var(--choice-blue);}
.editor-grid td.col-option2.is-filled::before{background:var(--choice-yellow);}
.editor-grid td.col-option3.is-filled::before{background:var(--choice-green);}
.editor-grid td.is-selected{
  box-shadow:inset 0 0 0 2px var(--focus), 0 0 0 3px rgba(242,166,90,.14);
  z-index:2;
}
.editor-grid td.is-range-selected{
  background:linear-gradient(180deg,#fffaf2,#fff)!important;
  box-shadow:inset 0 0 0 1px rgba(242,166,90,.32);
}
.editor-grid td.is-range-selected.is-empty{background:#fffaf2!important;}
.editor-grid td.is-range-selected.is-selected{
  box-shadow:inset 0 0 0 2px var(--focus), 0 0 0 3px rgba(242,166,90,.16);
}
.editor-grid .row-head.is-row-selected{
  background:#fff8df;
  color:#7a5d00;
  box-shadow:inset 3px 0 0 var(--focus);
}
.editor-grid .row-head:not(:has(.row-clear:hover)){cursor:pointer;}
.row-number{
  display:block;
  text-align:right;
  border-radius:8px;
  padding:1px 1px;
  user-select:none;
}
.editor-grid tbody .row-head:hover .row-number{background:rgba(242,166,90,.12); color:#7a5d00;}
.editor-grid td.is-error{
  background:var(--danger-soft)!important;
  box-shadow:inset 0 0 0 1px rgba(239,83,80,.55);
}
.editor-grid td.is-duplicate{
  background:linear-gradient(90deg,#ffe4e4,#fff7f7)!important;
  box-shadow:inset 0 0 0 2px rgba(239,83,80,.48);
}
.editor-grid td:focus{box-shadow:inset 0 0 0 2px var(--focus), 0 0 0 3px rgba(242,166,90,.14);}
.editor-grid td.is-find-match{background:linear-gradient(180deg,#eef6ff,#fff)!important;}
.editor-grid td.is-find-current{
  box-shadow:inset 0 0 0 2px var(--choice-blue), 0 0 0 3px rgba(66,165,245,.16)!important;
  z-index:2;
}
.editor-grid tr.has-error .row-head{background:#fff1f1; color:#9d3434;}

.preview-panel{display:grid; grid-template-rows:auto 1fr;}
.preview-title-wrap{display:flex; align-items:center; gap:8px; min-width:0;}
.preview-header-right{display:flex; align-items:center; gap:8px;}
.preview-toggle{
  width:32px;
  height:32px;
  min-width:32px;
  border-radius:999px;
  padding:0;
  background:#f7f8fa;
  color:var(--muted);
  box-shadow:none;
  border:1px solid var(--line);
  font-size:1.2rem;
  line-height:1;
}
.preview-toggle:hover:not(:disabled){background:#fff; color:var(--text); transform:none;}
.preview-panel.is-collapsed{grid-template-rows:1fr;}
.preview-panel.is-collapsed .preview-body,
.preview-panel.is-collapsed h2,
.preview-panel.is-collapsed .panel-hint{display:none;}
.preview-panel.is-collapsed .preview-header{
  justify-content:center;
  align-items:start;
  padding:12px 10px;
  border-bottom:0;
}
.preview-panel.is-collapsed .preview-title-wrap{justify-content:center;}
.preview-panel.is-collapsed .preview-header-right{display:none;}
.preview-panel.is-collapsed .preview-toggle{
  width:34px;
  height:34px;
  writing-mode:horizontal-tb;
}
.preview-nav{
  padding:12px 16px;
  display:flex;
  gap:8px;
  border-bottom:1px solid var(--line);
}
.preview-body{
  min-height:0;
  overflow:auto;
  padding:18px;
}
.preview-card{
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
  padding:22px 18px;
}
.preview-meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:14px;
}
.preview-question{
  min-height:110px;
  display:grid;
  place-items:center;
  text-align:center;
  font-size:clamp(1.45rem,3vw,2.1rem);
  font-weight:800;
  line-height:1.45;
  padding:10px;
}
.preview-choices{display:grid; gap:10px; margin-top:16px;}
.preview-choice{
  border-radius:16px;
  padding:.8rem 1rem;
  border:1px solid transparent;
  font-weight:700;
}
.preview-choice:nth-child(1){background:var(--choice-red-soft); border-color:#ffd1d1;}
.preview-choice:nth-child(2){background:var(--choice-blue-soft); border-color:#cfe6ff;}
.preview-choice:nth-child(3){background:var(--choice-yellow-soft); border-color:#ffe59c;}
.preview-choice:nth-child(4){background:var(--choice-green-soft); border-color:#cceccd;}
.preview-note{color:var(--muted); font-size:.88rem; margin-top:14px;}
.error-list{
  margin:14px 0 0;
  padding-left:1.2em;
  color:#963434;
  font-size:.9rem;
}
.empty-preview{color:var(--muted); text-align:center; padding:32px 12px;}

.editor-grid td.col-image{
  background:#fafbfc;
  cursor:pointer;
  color:var(--muted);
  font-weight:700;
  user-select:none;
  white-space:nowrap;
  overflow:hidden;
}
.editor-grid td.col-image.is-filled{background:linear-gradient(90deg,#f0f4f8,#fff 58%); color:#3d4650;}
.image-cell-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:20px;}
.image-cell-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.image-clear{
  width:18px;height:18px;min-width:18px;border-radius:999px;padding:0;
  border:1px solid transparent;background:transparent;color:transparent;box-shadow:none;
  font-size:.72rem;font-weight:900;line-height:1;
}
.editor-grid td.col-image.is-filled:hover .image-clear,
.image-clear:focus{color:#9d3434;background:#fff7f7;border-color:#efc1c1;}
.image-clear:hover:not(:disabled){transform:scale(1.04);box-shadow:none;}
.preview-image-wrap{display:grid;place-items:center;margin:0 0 14px;}
.preview-image-wrap img{max-width:100%;max-height:220px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 10px 24px rgba(31,45,61,.08);}
.preview-card.has-preview-image.layout-portrait .preview-image-and-question{display:grid;grid-template-columns:minmax(120px,42%) minmax(0,1fr);gap:14px;align-items:center;}
.preview-card.has-preview-image.layout-portrait .preview-question{text-align:left;}
.image-dialog-backdrop{position:fixed;inset:0;background:rgba(31,45,61,.28);backdrop-filter:blur(4px);z-index:40;display:grid;place-items:center;padding:18px;}
.image-dialog-backdrop[hidden]{display:none;}
.image-dialog{width:min(920px,calc(100vw - 36px));max-height:calc(100dvh - 36px);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 24px 70px rgba(31,45,61,.24);padding:18px;}
.image-dialog-header{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:12px;}
.image-dialog-header h2{margin:0;font-size:1.05rem;}
.image-dialog-note{margin:.2rem 0 0;color:var(--muted);font-size:.86rem;}
.image-dialog-body{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:14px;align-items:start;}
.crop-stage{border:1px solid var(--line);border-radius:18px;background:#f5f7fa;padding:10px;display:grid;place-items:center;min-height:320px;}
#imageCropCanvas{display:block;max-width:100%;height:auto;background:#fff;border-radius:12px;touch-action:none;cursor:crosshair;}
.image-dialog-tools{display:grid;gap:10px;}
.image-tool-group{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fbfcfd;}
.image-tool-title{font-size:.78rem;color:var(--muted);font-weight:800;margin-bottom:8px;}
.ratio-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ratio-button{padding:.5rem .42rem;border-radius:12px;display:grid;place-items:center;gap:4px;min-height:68px;background:#fff;}
.ratio-button.is-active{border-color:var(--focus);box-shadow:0 0 0 3px rgba(242,166,90,.16);}
.ratio-icon{width:42px;height:32px;display:block;}
.ratio-icon .frame{fill:none;stroke:#333;stroke-width:2.2;rx:2;}
.ratio-icon .line{stroke:#777;stroke-width:2;stroke-linecap:round;}
.ratio-label{font-size:.72rem;color:var(--muted);font-weight:800;}
.image-action-row{display:flex;flex-wrap:wrap;gap:8px;}
.image-dialog-footer{margin-top:14px;display:flex;justify-content:space-between;gap:10px;align-items:center;}
.image-size-note{color:var(--muted);font-size:.82rem;white-space:pre-line;}
.image-dialog-footer .footer-actions{display:flex;gap:8px;}
@media (max-width:780px){
  .image-dialog-body{grid-template-columns:1fr;}
  .preview-card.has-preview-image.layout-portrait .preview-image-and-question{grid-template-columns:1fr;}
}

.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  max-width:min(420px,calc(100vw - 36px));
  background:#222426;
  color:#fff;
  border-radius:16px;
  padding:.85rem 1rem;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  white-space:pre-line;
  transition:opacity var(--transition-normal), transform var(--transition-normal);
  z-index:10;
}
.toast.show{opacity:1; transform:translateY(0);}
.busy-overlay{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(2px);
  z-index:20;
}
.busy-overlay[hidden]{display:none;}
.busy-card{
  background:#222426;
  color:#fff;
  border-radius:16px;
  padding:.95rem 1.15rem;
  box-shadow:0 18px 44px rgba(0,0,0,.18);
  font-weight:700;
}

@media (max-width:980px){
  body{overflow:auto;}
  .summary-grid{grid-template-columns:repeat(2,minmax(140px,1fr));}
  .app{height:auto; min-height:100%;}
  .workarea{grid-template-columns:1fr;}
  .workarea.is-preview-collapsed{grid-template-columns:1fr;}
  .preview-panel{min-height:520px;}
  .preview-panel.is-collapsed{min-height:auto;}
  .toolbar{grid-template-columns:1fr;}
  .meta-fields{grid-template-columns:1fr;}
  .actions{justify-content:flex-start;}
  .header-main{grid-template-columns:1fr;}
  .version{text-align:left;}
}
@media (max-width:640px){
  .header{padding:14px 12px;}
  .summary-header{grid-template-columns:1fr auto;}
  .summary-brief{grid-column:1 / -1;}
  .summary-grid{grid-template-columns:1fr;}
  .feedback-sample-body{grid-template-columns:1fr;}
  .feedback-sample-buttons{grid-template-columns:1fr;}
  .workarea{padding:12px; gap:12px;}
  .panel{border-radius:18px;}
  button{padding:.66rem .82rem;}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-main">
      <div>
        <h1 class="brand-title">クイズエディタ</h1>
        </div>
      <div class="version">Editor v1.2.2<br>出力プレイヤー v1.2.2</div>
    </div>

    <div class="toolbar">
      <div class="meta-fields">
        <div class="title-field">
          <label for="quizTitle">タイトル（必須）</label>
          <input id="quizTitle" type="text" autocomplete="off" placeholder="例：明治時代 小テスト">
        </div>
        <div class="title-field author-field">
          <label for="quizAuthor">クイズ作成者（任意）</label>
          <input id="quizAuthor" type="text" autocomplete="off" placeholder="空欄なら匿名">
        </div>
      </div>
      <div class="actions" id="menuBar" aria-label="操作メニュー">
        <div class="menu-group">
          <button class="menu-button" type="button" data-menu-button="file" aria-expanded="false">ファイル</button>
          <div class="menu-list" data-menu-panel="file">
            <button class="menu-item" type="button" data-action="load-project"><span class="menu-label">プロジェクト読込</span></button>
            <button class="menu-item" type="button" data-action="save-project"><span class="menu-label">プロジェクト保存</span></button>
            <div class="menu-separator"></div>
            <button class="menu-item" type="button" data-action="import-csv"><span class="menu-label">CSV読込</span></button>
            <button class="menu-item" type="button" data-action="import-tsv"><span class="menu-label">TSV読込</span></button>
            <button class="menu-item" type="button" data-action="export-csv"><span class="menu-label">CSV書出</span></button>
            <button class="menu-item" type="button" data-action="export-tsv"><span class="menu-label">TSV書出</span></button>
          </div>
        </div>
        <div class="menu-group">
          <button class="menu-button" type="button" data-menu-button="edit" aria-expanded="false">編集</button>
          <div class="menu-list" data-menu-panel="edit">
            <button class="menu-item" type="button" data-action="undo"><span class="menu-label">元に戻す</span><span class="menu-shortcut">Ctrl/⌘ Z</span></button>
            <button class="menu-item" type="button" data-action="redo"><span class="menu-label">やり直す</span><span class="menu-shortcut">Ctrl/⌘ Y</span></button>
            <div class="menu-separator"></div>
            <button class="menu-item" type="button" data-action="find"><span class="menu-label">検索</span><span class="menu-shortcut">Ctrl/⌘ F</span></button>
            <button class="menu-item" type="button" data-action="move-up"><span class="menu-label">行を上へ移動</span></button>
            <button class="menu-item" type="button" data-action="move-down"><span class="menu-label">行を下へ移動</span></button>
            <button class="menu-item" type="button" data-action="compact-rows"><span class="menu-label">空行を詰める</span></button>
            <button class="menu-item" type="button" data-action="clear-selection"><span class="menu-label">選択範囲をクリア</span><span class="menu-shortcut">Del</span></button>
            <button class="menu-item" type="button" data-action="clear-grid"><span class="menu-label">表をクリア</span></button>
          </div>
        </div>
        <div class="menu-group generate-group">
          <button id="btnGenerate" class="primary generate-button" type="button" data-menu-button="generate" aria-expanded="false" disabled>生成</button>
          <div class="menu-list" data-menu-panel="generate">
            <button class="menu-item" type="button" data-action="generate-file"><span class="menu-label">HTMLファイル</span></button>
            <button class="menu-item" type="button" data-action="copy-generated-html"><span class="menu-label">HTML全文をコピー</span><span class="menu-shortcut">コード全文</span></button>
          </div>
        </div>
        <input id="projectFileInput" type="file" accept=".quiz.json,application/json" hidden>
        <input id="tabularFileInput" type="file" accept=".csv,.tsv,text/csv,text/tab-separated-values,text/plain" hidden>
        <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>
      </div>
    </div>

    <div class="status-row" aria-live="polite">
      <span id="statusValid" class="badge">有効問題：0問</span>
      <span id="statusErrors" class="badge">エラー：0件</span>
      <span id="statusSelected" class="badge">選択：1行目 / 問題</span>
      <span id="statusHint" class="badge warn">Shiftクリックで範囲選択 / 右クリックで編集</span>
    </div>

    <div id="findPanel" class="find-panel" hidden>
      <label for="findInput">検索</label>
      <input id="findInput" type="search" autocomplete="off" placeholder="表の中を検索">
      <span id="findCount" class="find-count">0件</span>
      <button id="btnFindPrev" class="soft" type="button">前へ</button>
      <button id="btnFindNext" class="soft" type="button">次へ</button>
      <button id="btnFindClose" class="soft" type="button" aria-label="検索を閉じる">閉じる</button>
    </div>

    <section id="summaryPanel" class="summary-panel is-collapsed" aria-label="生成前サマリー">
      <button id="summaryHeader" class="summary-header" type="button" aria-expanded="false">
        <span class="summary-title">生成前サマリー</span>
        <span id="summaryBrief" class="summary-brief">有効問題：0問 / エラー：0件 / タイトル未入力</span>
        <span id="summaryIcon" class="summary-icon">開く</span>
      </button>
      <div id="summaryBody" class="summary-body"></div>
    </section>

    <details class="feedback-sample-panel" id="feedbackSamplePanel">
      <summary>正誤演出サンプル</summary>
      <div class="feedback-sample-body">
        <div id="feedbackSamplePreview" class="feedback-sample-preview correct">正解</div>
        <div class="feedback-sample-buttons" aria-label="正誤演出サンプル操作">
          <button type="button" data-feedback-sample="correct-bounce">正解1：バウンド＋ストレッチ</button>
          <button type="button" data-feedback-sample="correct-pop">正解2：ポップ拡大</button>
          <button type="button" data-feedback-sample="correct-float">正解3：ふわっと浮く</button>
          <button type="button" data-feedback-sample="correct-pulse">正解4：軽いパルス</button>
          <button type="button" data-feedback-sample="wrong-shake">誤り1：横振動</button>
          <button type="button" data-feedback-sample="wrong-sink">誤り2：一瞬沈む</button>
          <button type="button" data-feedback-sample="wrong-tilt">誤り3：小さな傾き</button>
          <button type="button" data-feedback-sample="wrong-catch">誤り4：縮み戻り</button>
        </div>
      </div>
    </details>
  </header>

  <main class="workarea" id="workarea">
    <section class="panel table-panel" aria-label="問題入力表">
      <div class="panel-header">
        <h2>問題一覧</h2>
        <div class="panel-tools" aria-label="編集履歴">
          <button id="btnUndo" class="soft" type="button" disabled title="元に戻す（Ctrl/Cmd+Z）">元に戻す</button>
          <button id="btnRedo" class="soft" type="button" disabled title="やり直す（Ctrl/Cmd+Y）">やり直す</button>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table class="editor-grid" id="editorGrid"></table>
      </div>
    </section>

    <aside class="panel preview-panel" id="previewPanel" aria-label="プレビュー">
      <div class="panel-header preview-header">
        <div class="preview-title-wrap">
          <button id="btnTogglePreview" class="preview-toggle" type="button" aria-expanded="true" aria-controls="previewBody" title="プレビューを格納" aria-label="プレビューを格納">＞</button>
          <h2>プレビュー</h2>
        </div>
        <div class="preview-header-right">
          <div id="previewCounter" class="panel-hint">0 / 0</div>
        </div>
      </div>
      <div id="previewBody" class="preview-body"></div>
    </aside>
  </main>
</div>
<div id="contextMenu" class="context-menu" hidden>
  <button class="menu-item" type="button" data-action="clear-row"><span class="menu-label">この行をクリア</span></button>
  <button class="menu-item" type="button" data-action="move-up"><span class="menu-label">行を上へ移動</span></button>
  <button class="menu-item" type="button" data-action="move-down"><span class="menu-label">行を下へ移動</span></button>
  <button class="menu-item" type="button" data-action="compact-rows"><span class="menu-label">空行を詰める</span></button>
  <div class="menu-separator"></div>

function renderGrid(){
  const colgroup = document.createElement('colgroup');
  const rowHeadCol = document.createElement('col');
  rowHeadCol.style.width = '46px';
  colgroup.appendChild(rowHeadCol);
  COLUMNS.forEach(col => {
    const el = document.createElement('col');
    el.style.width = col.width;
    colgroup.appendChild(el);
  });

  const thead = document.createElement('thead');
  const trHead = document.createElement('tr');
  const corner = document.createElement('th');
  corner.className = 'row-head';
  corner.textContent = '#';
  trHead.appendChild(corner);
  COLUMNS.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col.label;
    trHead.appendChild(th);
  });
  thead.appendChild(trHead);

  const tbody = document.createElement('tbody');
  for(let r=0; r<ROW_COUNT; r++){
    const tr = document.createElement('tr');
    tr.dataset.row = String(r);
    const rowHead = document.createElement('th');
    rowHead.scope = 'row';
    rowHead.className = 'row-head';
    rowHead.innerHTML = `
      <div class="row-head-content">
        <button type="button" class="row-clear" data-clear-row="${r}" aria-label="${r+1}行目をクリア" title="${r+1}行目をクリア">×</button>
        <span class="row-number">${r + 1}</span>
      </div>
    `;
    tr.appendChild(rowHead);
    COLUMNS.forEach((col,c) => {
      const td = document.createElement('td');
      td.spellcheck = false;
      td.dataset.row = String(r);
      td.dataset.col = String(c);
      td.dataset.key = col.key;
      td.setAttribute('aria-label', `${r+1}行目 ${col.label}`);
      if(col.colorClass) td.classList.add(col.colorClass);
      if(col.type === 'image'){
        td.contentEditable = 'false';
        td.tabIndex = 0;
        td.classList.add('image-cell');
        renderImageCell(td, null);
      }else{
        td.contentEditable = 'true';
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  grid.innerHTML = '';
  grid.appendChild(colgroup);
  grid.appendChild(thead);
  grid.appendChild(tbody);
}

function bindEvents(){
  grid.addEventListener('input', handleGridInput);
  grid.addEventListener('mousedown', handleGridMouseDown);
  grid.addEventListener('click', (e) => {
    const imageDelete = e.target.closest('[data-image-delete]');
    if(imageDelete){
      e.preventDefault();
      e.stopPropagation();
      clearRowImage(Number(imageDelete.dataset.imageDelete));
      return;
    }
    const imageCell = e.target.closest('td[data-key="image"]');
    if(imageCell){
      e.preventDefault();
      e.stopPropagation();
      openImageDialog(Number(imageCell.dataset.row));
      return;
    }
    const clearButton = e.target.closest('[data-clear-row]');
    if(!clearButton) return;
    e.preventDefault();
    e.stopPropagation();
    clearRow(Number(clearButton.dataset.clearRow));
  });
  grid.addEventListener('focusin', (e) => {
    const cell = e.target.closest('td');
    if(!cell) return;
    const row = Number(cell.dataset.row);
    const col = Number(cell.dataset.col);
    selected = {row, col};
    if(suppressNextFocusSelection){
      suppressNextFocusSelection = false;
    }else{
      setSingleCellSelection(row, col, false);
    }
    updateSelectedLabel();
    applyCellClasses();
    updatePreview();
  });
  grid.addEventListener('keydown', handleGridKeydown);
  grid.addEventListener('paste', handlePaste);
  grid.addEventListener('copy', handleCopy);

  titleInput.addEventListener('input', handleTitleInput);
  authorInput.addEventListener('input', handleAuthorInput);
  document.querySelectorAll('[data-feedback-sample]').forEach(btn => {
    btn.addEventListener('click', () => playFeedbackSample(btn.dataset.feedbackSample));
  });
  summaryHeader.addEventListener('click', toggleSummary);
  btnTogglePreview.addEventListener('click', togglePreview);
  btnUndo.addEventListener('click', undoHistory);
  btnRedo.addEventListener('click', redoHistory);
  findInput.addEventListener('input', handleFindInput);
  findInput.addEventListener('keydown', handleFindKeydown);
  btnFindPrev.addEventListener('click', () => jumpFindResult(-1));
  btnFindNext.addEventListener('click', () => jumpFindResult(1));
  btnFindClose.addEventListener('click', closeFindPanel);
  projectFileInput.addEventListener('change', handleProjectFileSelected);
  tabularFileInput.addEventListener('change', handleTabularFileSelected);
  imageFileInput.addEventListener('change', handleImageFileSelected);
  btnImageChoose.addEventListener('click', () => imageFileInput.click());
  btnImageDialogClose.addEventListener('click', closeImageDialog);
  btnImageCancel.addEventListener('click', closeImageDialog);
  btnImageApply.addEventListener('click', applyImageDialog);
  btnImageUseAll.addEventListener('click', () => resetCropToFull(true));
  btnImageCenter.addEventListener('click', () => resetCropToAspect(true));
  btnImageDeleteDialog.addEventListener('click', deleteImageFromDialog);
  document.querySelectorAll('[data-image-ratio]').forEach(btn => btn.addEventListener('click', () => setImageRatio(btn.dataset.imageRatio)));
  bindImageCanvasEvents();
  menuBar.addEventListener('click', handleMenuClick);
  grid.addEventListener('contextmenu', handleGridContextMenu);
  contextMenu.addEventListener('click', handleContextMenuClick);
  document.addEventListener('click', closeTransientMenus);
  document.addEventListener('keydown', handleGlobalKeydown);
  window.addEventListener('resize', closeTransientMenus);
}

function handleGridInput(e){
  const cell = e.target?.closest?.('td');
  if(cell && (cell.dataset.key === 'difficulty' || cell.dataset.key === 'timeLimit')){
    const normalized = normalizeColumnValue(cell.dataset.key, cell.textContent);
    if(cell.textContent !== normalized){
      cell.textContent = normalized;
      placeCaretAtEnd(cell);
    }
  }
  validateAndRender();
  scheduleHistory();
}

function handleTitleInput(){
  validateAndRender();
  scheduleHistory();
}


function handleAuthorInput(){
  scheduleHistory();
}

function normalizeQuizAuthor(value){
  const name = normalizeCellText(value || '').trim();
  return name || '匿名';
}

function playFeedbackSample(kind){
  const preview = $('feedbackSamplePreview');
  if(!preview || !kind) return;
  const isCorrect = kind.startsWith('correct');
  preview.textContent = isCorrect ? '正解' : '誤り';
  preview.className = `feedback-sample-preview ${isCorrect ? 'correct' : 'wrong'}`;
  void preview.offsetWidth;
  preview.classList.add(`sample-${kind}`);
}


function handleMenuClick(e){
  const menuButton = e.target.closest('[data-menu-button]');
  if(menuButton){
    e.stopPropagation();
    toggleMenu(menuButton);
    return;
  }
  const item = e.target.closest('[data-action]');
  if(!item) return;
  e.stopPropagation();
  closeMenus();
  runAction(item.dataset.action);
}

function toggleMenu(button){
  const group = button.closest('.menu-group');
  const willOpen = !group.classList.contains('is-open');
  if(willOpen && button.dataset.menuButton === 'generate' && hasAnyImage()){
    alert('クイズデータから元画像の復元はできません。\n元画像とクロップ情報を残す場合は、プロジェクト保存を使用してください。');
  }
  closeMenus();
  group.classList.toggle('is-open', willOpen);
  button.setAttribute('aria-expanded', String(willOpen));
}

function closeMenus(){
  document.querySelectorAll('.menu-group.is-open').forEach(group => {
    group.classList.remove('is-open');
    group.querySelector('[data-menu-button]')?.setAttribute('aria-expanded','false');
  });
}

function closeContextMenu(){
  contextMenu.hidden = true;
}

function closeTransientMenus(e){
  if(e && (menuBar.contains(e.target) || contextMenu.contains(e.target))) return;
  closeMenus();
  closeContextMenu();
}

function handleContextMenuClick(e){
  const item = e.target.closest('[data-action]');
  if(!item) return;
  e.stopPropagation();
  closeContextMenu();
  runAction(item.dataset.action);
}

function handleGridContextMenu(e){
  const cell = e.target.closest('td');
  const rowHead = e.target.closest('tbody .row-head');
  if(!cell && !rowHead) return;
  e.preventDefault();
  const row = Number(cell?.dataset.row ?? rowHead?.closest('tr[data-row]')?.dataset.row);
  const col = Number(cell?.dataset.col ?? 0);
  if(Number.isInteger(row)){
    contextRow = row;
    if(cell && !isCellInSelection(row,col)) setSingleCellSelection(row,col);
    if(rowHead && !isRowInSelection(row)){
      selected = {row, col:0};
      setRowSelection(row,row);
      updateSelectedLabel();
      applyCellClasses();
      updatePreview();
    }
  }
  const pad = 8;
  contextMenu.hidden = false;
  const rect = contextMenu.getBoundingClientRect();
  const x = Math.min(e.clientX, window.innerWidth - rect.width - pad);
  const y = Math.min(e.clientY, window.innerHeight - rect.height - pad);
  contextMenu.style.left = Math.max(pad,x) + 'px';
  contextMenu.style.top = Math.max(pad,y) + 'px';
}

function runAction(action){
  if(action === 'load-project') projectFileInput.click();
  else if(action === 'save-project') saveProjectFile();
  else if(action === 'import-csv') openTabularFile('csv');
  else if(action === 'import-tsv') openTabularFile('tsv');
  else if(action === 'export-csv') exportTabularFile('csv');
  else if(action === 'export-tsv') exportTabularFile('tsv');
  else if(action === 'generate-file') generateHtmlFile();
  else if(action === 'copy-generated-html') copyGeneratedHtml();
  else if(action === 'undo') undoHistory();
  else if(action === 'redo') redoHistory();
  else if(action === 'find') findTextInGrid();
  else if(action === 'move-up') moveSelectedRows(-1);
  else if(action === 'move-down') moveSelectedRows(1);
  else if(action === 'compact-rows') compactBlankRows();
  else if(action === 'clear-selection') clearSelectionAny();
  else if(action === 'clear-row') clearRow(contextRow);
  else if(action === 'clear-grid') clearGrid();
  else if(action === 'copy-selection') copySelectionFromMenu();
}


function handleGlobalKeydown(e){
  if(e.isComposing) return;
  const key = e.key.toLowerCase();
  if(key === 'escape'){
    closeMenus();
    closeContextMenu();
    if(!findPanel.hidden) closeFindPanel();
    return;
  }

  const mod = e.ctrlKey || e.metaKey;
  if(!mod) return;

  if(key === 'z'){
    e.preventDefault();
    if(e.shiftKey) redoHistory();
    else undoHistory();
  }else if(key === 'y'){
    e.preventDefault();
    redoHistory();
  }else if(key === 'f'){
    e.preventDefault();
    findTextInGrid();
  }
}

function makeSnapshot(){
  const rows = [];
  for(let r=0; r<ROW_COUNT; r++){
    const values = [];
    for(let c=0; c<COLUMNS.length; c++){
      values.push(getCell(r,c)?.textContent || '');
    }
    rows.push(values);
  }
  return JSON.stringify({title:titleInput.value || '', author:authorInput.value || '', rows});
}

function scheduleHistory(){
  if(isRestoringHistory) return;
  clearTimeout(historyTimer);
  historyTimer = setTimeout(() => recordHistoryNow('edit'), 320);
}

function recordHistoryNow(reason='edit'){
  if(isRestoringHistory) return;
  clearTimeout(historyTimer);
  historyTimer = null;
  const snap = makeSnapshot();
  if(historyStack[historyIndex] === snap){
    updateHistoryButtons();
    return;
  }
  if(historyIndex < historyStack.length - 1){
    historyStack = historyStack.slice(0, historyIndex + 1);
  }
  historyStack.push(snap);
  if(historyStack.length > HISTORY_LIMIT){
    historyStack.shift();
  }
  historyIndex = historyStack.length - 1;
  updateHistoryButtons();
}

function restoreSnapshot(snapshot){
  if(!snapshot) return;
  let data;
  try{
    data = JSON.parse(snapshot);
  }catch(err){
    console.warn('History restore failed', err);
    return;
  }
  isRestoringHistory = true;
  titleInput.value = data.title || '';
  authorInput.value = data.author || '';
  const rows = Array.isArray(data.rows) ? data.rows : [];
  for(let r=0; r<ROW_COUNT; r++){
    for(let c=0; c<COLUMNS.length; c++){
      const cell = getCell(r,c);
      if(cell) cell.textContent = rows[r]?.[c] || '';
    }
  }
  validateAndRender();
  applyCellClasses();
  const b = getSelectionBounds();
  focusCell(Math.min(b.rowMin, ROW_COUNT - 1), Math.min(b.colMin, COLUMNS.length - 1), {preserveSelection:true});
  isRestoringHistory = false;
  updateHistoryButtons();
}

function undoHistory(){
  recordHistoryNow('before-undo');
  if(historyIndex <= 0) return;
  historyIndex -= 1;
  restoreSnapshot(historyStack[historyIndex]);
  showToast('元に戻しました');
}

function redoHistory(){
  if(historyIndex >= historyStack.length - 1) return;
  historyIndex += 1;
  restoreSnapshot(historyStack[historyIndex]);
  showToast('やり直しました');
}

function updateHistoryButtons(){
  if(btnUndo) btnUndo.disabled = historyIndex <= 0;
  if(btnRedo) btnRedo.disabled = historyIndex < 0 || historyIndex >= historyStack.length - 1;
}

function handleGridMouseDown(e){
  if(e.target.closest('[data-clear-row]')) return;

  const rowHead = e.target.closest('tbody .row-head');
  if(rowHead){
    e.preventDefault();
    const tr = rowHead.closest('tr[data-row]');
    const row = Number(tr?.dataset.row);
    if(!Number.isInteger(row)) return;
    if(e.shiftKey){
      setRowSelection(rowSelectionAnchor, row);
    }else{
      rowSelectionAnchor = row;
      setRowSelection(row, row);
    }
    selected = {row, col:0};
    suppressNextFocusSelection = true;
    getCell(row,0)?.focus({preventScroll:true});
    updateSelectedLabel();
    applyCellClasses();
    updatePreview();
    return;
  }

  const cell = e.target.closest('td');
  if(!cell) return;
  const row = Number(cell.dataset.row);
  const col = Number(cell.dataset.col);
  if(e.shiftKey){
    e.preventDefault();
    setRangeSelection(selectionAnchor, {row, col});
    selected = {row, col};
    suppressNextFocusSelection = true;
    cell.focus({preventScroll:true});
    updateSelectedLabel();
    applyCellClasses();
    updatePreview();
  }else{
    selectionAnchor = {row, col};
    rowSelectionAnchor = row;
    setSingleCellSelection(row, col, false);
  }
}

function handleGridKeydown(e){
  const activeCell = e.target.closest('td');
  if(!activeCell) return;

  if((e.key === 'Delete' || e.key === 'Backspace') && isClearableSelection()){
    e.preventDefault();
    clearSelectedCells();
    return;
  }

  if(e.key === 'Enter'){
    e.preventDefault();
    const currentRow = Number(activeCell.dataset.row);
    const currentCol = Number(activeCell.dataset.col);
    const row = Number.isInteger(currentRow) ? currentRow : selected.row;
    const col = Number.isInteger(currentCol) ? currentCol : selected.col;
    const dir = e.shiftKey ? -1 : 1;
    focusCell(Math.max(0, Math.min(ROW_COUNT - 1, row + dir)), col);
  }else if(e.key === 'Tab'){
    e.preventDefault();
    const dir = e.shiftKey ? -1 : 1;
    const total = ROW_COUNT * COLUMNS.length;
    const current = selected.row * COLUMNS.length + selected.col;
    const next = Math.max(0, Math.min(total - 1, current + dir));
    focusCell(Math.floor(next / COLUMNS.length), next % COLUMNS.length);
  }
}

function handleCopy(e){
  if(!grid.contains(document.activeElement)) return;
  const text = selectionToTsv();
  if(!text) return;
  e.clipboardData.setData('text/plain', text);
  e.preventDefault();
  showToast('選択範囲をコピーしました');
}

function handlePaste(e){
  const target = e.target.closest('td');
  if(!target) return;
  const text = e.clipboardData?.getData('text/plain') || '';
  if(!text.includes('\t') && !text.includes('\n')) return;
  e.preventDefault();
  const startCell = getPasteStartCell();
  const rows = text.replace(/\r/g,'').split('\n');
  if(rows.length && rows[rows.length-1] === '') rows.pop();
  let maxR = startCell.row;
  let maxC = startCell.col;
  rows.forEach((line, rOffset) => {
    const cells = line.split('\t');
    cells.forEach((value, cOffset) => {
      const r = startCell.row + rOffset;
      const c = startCell.col + cOffset;
      if(r >= ROW_COUNT || c >= COLUMNS.length) return;
      if(COLUMNS[c]?.type === 'image') return;
      const cell = getCell(r,c);
      if(cell) cell.textContent = normalizeColumnValue(COLUMNS[c].key, value);
      maxR = Math.max(maxR, r);
      maxC = Math.max(maxC, c);
    });
  });
  setRangeSelection(startCell, {row:maxR, col:maxC});
  selected = {row:startCell.row, col:startCell.col};
  validateAndRender();
  recordHistoryNow('paste');
  focusCell(startCell.row, startCell.col, {preserveSelection:true});
  showToast('貼り付けました');
}

function normalizeCellText(value){
  return String(value ?? '').replace(/ /g,' ').trim();
}
function toHalfWidthDigits(value){
  return String(value ?? '').replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}
function normalizeNumericText(value){
  return toHalfWidthDigits(normalizeCellText(value)).replace(/[　\s]+/g, '');
}
function normalizeColumnValue(key, value){
  if(key === 'image') return '';
  if(key === 'difficulty' || key === 'timeLimit') return normalizeNumericText(value);
  return normalizeCellText(value);
}
function placeCaretAtEnd(el){
  try{
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }catch(_){/* ignore */}
}

function getCell(row,col){
  return grid.querySelector(`td[data-row="${row}"][data-col="${col}"]`);
}

function focusCell(row,col, options={}){
  const cell = getCell(row,col);
  if(!cell) return;
  if(options.preserveSelection) suppressNextFocusSelection = true;
  cell.focus();
  selected = {row,col};
  if(!options.preserveSelection){
    setSingleCellSelection(row, col, false);
  }
  updateSelectedLabel();
  applyCellClasses();
}

function setSingleCellSelection(row, col, render=true){
  selected = {row, col};
  selection = {mode:'cell', start:{row, col}, end:{row, col}};
  selectionAnchor = {row, col};
  rowSelectionAnchor = row;
  if(render){
    updateSelectedLabel();
    applyCellClasses();
    updatePreview();
  }
}

function setRangeSelection(start, end){
  selection = {
    mode:'range',
    start:{row:start.row, col:start.col},
    end:{row:end.row, col:end.col}
  };
}

function setRowSelection(startRow, endRow){
  selection = {
    mode:'rows',
    start:{row:startRow, col:0},
    end:{row:endRow, col:COLUMNS.length - 1}
  };
}

function getSelectionBounds(){
  const start = selection.start || selected;
  const end = selection.end || selected;
  const rowMin = Math.max(0, Math.min(start.row, end.row));
  const rowMax = Math.min(ROW_COUNT - 1, Math.max(start.row, end.row));
  const colMin = selection.mode === 'rows' ? 0 : Math.max(0, Math.min(start.col, end.col));
  const colMax = selection.mode === 'rows' ? COLUMNS.length - 1 : Math.min(COLUMNS.length - 1, Math.max(start.col, end.col));
  return {rowMin, rowMax, colMin, colMax};
}

function isCellInSelection(row, col){
  const b = getSelectionBounds();
  return row >= b.rowMin && row <= b.rowMax && col >= b.colMin && col <= b.colMax;
}

function isRowInSelection(row){
  if(selection.mode !== 'rows') return false;
  const b = getSelectionBounds();
  return row >= b.rowMin && row <= b.rowMax;
}

function isClearableSelection(){
  if(selection.mode === 'rows') return true;
  if(selection.mode !== 'range') return false;
  const b = getSelectionBounds();
  return b.rowMin !== b.rowMax || b.colMin !== b.colMax;
}

function clearSelectedCells(){
  const b = getSelectionBounds();
  for(let r=b.rowMin; r<=b.rowMax; r++){
    for(let c=b.colMin; c<=b.colMax; c++){
      const cell = getCell(r,c);
      if(COLUMNS[c]?.key === 'image') setRowImage(r, null, false);
      else if(cell) cell.textContent = '';
    }
  }
  validateAndRender();
  recordHistoryNow('clear-selection');
  focusCell(b.rowMin, b.colMin, {preserveSelection:true});
  showToast(selection.mode === 'rows' ? '選択行をクリアしました' : '選択範囲をクリアしました');
}

function selectionToTsv(){
  const b = getSelectionBounds();
  const lines = [];
  for(let r=b.rowMin; r<=b.rowMax; r++){
    const values = [];
    for(let c=b.colMin; c<=b.colMax; c++){
      values.push(COLUMNS[c]?.key === 'image' ? '' : normalizeColumnValue(COLUMNS[c].key, getCell(r,c)?.textContent || ''));
    }
    lines.push(values.join('\t'));
  }
  return lines.join('\n');
}

function getPasteStartCell(){
  const b = getSelectionBounds();
  return {row:b.rowMin, col:b.colMin};
}

function readRows(){
  const rows = [];
  for(let r=0; r<ROW_COUNT; r++){
    const obj = {};
    COLUMNS.forEach((col,c) => {
      if(col.key === 'image'){
        const image = normalizeProjectImage(rowImages[r]);
        if(image) obj.image = image;
      }else{
        obj[col.key] = normalizeColumnValue(col.key, getCell(r,c)?.textContent || '');
      }
    });
    rows.push(obj);
  }
  return rows;
}

function normalizeYesNoAnswer(value){
  const raw = normalizeCellText(value || '');
  const normalized = raw.toLocaleLowerCase('ja-JP').replace(/[　\s_-]/g, '');
  const yesTokens = new Set(['イエス','いえす','はい','yes','y','true','t','1','○','〇','まる','マル','正しい']);
  const noTokens = new Set(['ノー','のー','いいえ','no','n','false','f','0','×','✕','ばつ','バツ','誤り']);
  if(yesTokens.has(raw) || yesTokens.has(normalized)) return 'yes';
  if(noTokens.has(raw) || noTokens.has(normalized)) return 'no';
  return '';
}

function isTrueFalseAnswer(value){
  return !!normalizeYesNoAnswer(value);
}

function validateRow(row, index){
  const values = {...row};
  values.difficulty = normalizeNumericText(values.difficulty);
  values.timeLimit = normalizeNumericText(values.timeLimit);
  const anyFilled = COLUMNS.some(col => values[col.key]);
  const errors = [];
  const errorKeys = new Set();
  const duplicateKeys = new Set();

  if(!anyFilled){
    return {index, status:'empty', values, errors, errorKeys, duplicateKeys, valid:false};
  }

  if(!values.question){
    errors.push('問題が未入力です');
    errorKeys.add('question');
  }
  if(!values.answer){
    errors.push('正解が未入力です');
    errorKeys.add('answer');
  }

  const answerIsYesNo = isTrueFalseAnswer(values.answer);
  const optionValues = ['option1','option2','option3'].map(key => values[key]).filter(Boolean);
  const isTrueFalse = answerIsYesNo && optionValues.length === 0;

  if(values.answer && !isTrueFalse && optionValues.length < 1){
    errors.push('2〜4択にするには、オプションを1つ以上入力してください');
    errorKeys.add('option1');
  }

  if(!isTrueFalse){
    const choiceKeys = ['answer','option1','option2','option3'];
    const seen = new Map();
    choiceKeys.forEach(key => {
      const v = values[key];
      if(!v) return;
      const norm = v.trim().toLocaleLowerCase('ja-JP');
      if(!seen.has(norm)) seen.set(norm, []);
      seen.get(norm).push(key);
    });
    seen.forEach(keys => {
      if(keys.length > 1){
        errors.push('正解・選択肢に重複があります');
        keys.forEach(k => duplicateKeys.add(k));
      }
    });
  }

  if(values.difficulty && !['1','2','3'].includes(values.difficulty)){
    errors.push('難易度は1〜3で入力してください');
    errorKeys.add('difficulty');
  }

  if(values.timeLimit){
    const n = Number(values.timeLimit);
    if(!Number.isInteger(n) || n < 5 || n > 600){
      errors.push('制限時間は5〜600秒の整数で入力してください');
      errorKeys.add('timeLimit');
    }
  }

  duplicateKeys.forEach(k => errorKeys.add(k));
  return {
    index,
    status:errors.length ? 'error' : 'valid',
    values,
    errors,
    errorKeys,
    duplicateKeys,
    valid:errors.length === 0
  };
}

function validateAndRender(){
  validation = readRows().map(validateRow);
  if(findPanel && !findPanel.hidden) updateFindResults(false);
  else applyCellClasses();
  updateStatus();
  updatePreview();
}

function applyCellClasses(){
  for(let r=0; r<ROW_COUNT; r++){
    const rowResult = validation[r];
    const tr = grid.querySelector(`tr[data-row="${r}"]`);
    const rowHead = tr?.querySelector('.row-head');
    if(tr) tr.classList.toggle('has-error', rowResult?.status === 'error');
    if(rowHead) rowHead.classList.toggle('is-row-selected', isRowInSelection(r));
    COLUMNS.forEach((col,c) => {
      const cell = getCell(r,c);
      if(!cell) return;
      const val = col.key === 'image' ? !!rowImages[r] : normalizeColumnValue(col.key, cell.textContent);
      const activeCell = selected.row === r && selected.col === c;
      const rangeSelected = selection.mode !== 'cell' && isCellInSelection(r,c);
      cell.classList.toggle('is-empty', !val);
      cell.classList.toggle('is-filled', !!val);
      cell.classList.toggle('is-range-selected', rangeSelected);
      cell.classList.toggle('is-selected', activeCell);
      cell.classList.toggle('is-find-match', isFindMatch(r,c));
      cell.classList.toggle('is-find-current', isFindCurrent(r,c));
      cell.classList.toggle('is-error', !!rowResult?.errorKeys?.has(col.key));
      cell.classList.toggle('is-duplicate', !!rowResult?.duplicateKeys?.has(col.key));
    });
  }
}

function updateStatus(){
  const validRows = validation.filter(r => r.status === 'valid');
  const errorRows = validation.filter(r => r.status === 'error');
  const titleOk = !!titleInput.value.trim();
  const shouldHighlightTitle = !titleOk && errorRows.length === 0;
  titleInput.classList.toggle('needs-title', shouldHighlightTitle);
  titleInput.closest('.title-field')?.classList.toggle('is-title-needed', shouldHighlightTitle);
  statusValid.textContent = `有効問題：${validRows.length}問`;
  statusValid.className = 'badge ' + (validRows.length ? 'good' : '');
  statusErrors.textContent = `エラー：${errorRows.length}件`;
  statusErrors.className = 'badge ' + (errorRows.length ? 'bad' : '');
  btnGenerate.disabled = !(titleOk && validRows.length > 0 && errorRows.length === 0);
  updateSelectedLabel();
  updateSummary();
}

function updateSelectedLabel(){
  const b = getSelectionBounds();
  if(selection.mode === 'rows'){
    const label = b.rowMin === b.rowMax ? `${b.rowMin + 1}行目` : `${b.rowMin + 1}〜${b.rowMax + 1}行目`;
    statusSelected.textContent = `選択：${label} / 全列`;
    return;
  }
  if(selection.mode === 'range' && (b.rowMin !== b.rowMax || b.colMin !== b.colMax)){
    const rowLabel = b.rowMin === b.rowMax ? `${b.rowMin + 1}行目` : `${b.rowMin + 1}〜${b.rowMax + 1}行目`;
    const colLabel = b.colMin === b.colMax ? COLUMNS[b.colMin].label : `${COLUMNS[b.colMin].label}〜${COLUMNS[b.colMax].label}`;
    statusSelected.textContent = `選択：${rowLabel} / ${colLabel}`;
    return;
  }
  const colLabel = COLUMNS[selected.col]?.label || '';
  statusSelected.textContent = `選択：${selected.row + 1}行目 / ${colLabel}`;
}

function getSummaryStats(){
  const validRows = getValidRows();
  const errorRows = validation.filter(r => r.status === 'error');
  const title = titleInput.value.trim();
  const filename = title ? sanitizeFilename(title) + '.html' : 'タイトル入力後に表示';
  const difficultyCounts = {basic:0, advanced:0, hard:0};
  let trueFalseCount = 0;
  let choiceCount = 0;
  let explanationCount = 0;
  const categories = new Set();

  validRows.forEach(row => {
    const v = row.values;
    const isTf = isTrueFalseAnswer(v.answer) && !v.option1 && !v.option2 && !v.option3;
    if(isTf) trueFalseCount++;
    else choiceCount++;
    if(v.explanation) explanationCount++;
    if(v.category) categories.add(v.category);
    if(v.difficulty === '3') difficultyCounts.hard++;
    else if(v.difficulty === '2') difficultyCounts.advanced++;
    else difficultyCounts.basic++;
  });

  return {
    title,
    filename,
    validCount:validRows.length,
    errorCount:errorRows.length,
    trueFalseCount,
    choiceCount,
    explanationCount,
    categoryCount:categories.size,
    difficultyCounts
  };
}

  const stats = getSummaryStats();

function toggleSummary(){
  summaryCollapsed = !summaryCollapsed;
  updateSummary();
}

function getValidRows(){
  return validation.filter(r => r.status === 'valid');
}

function syncPreviewToSelectedRow(showMessage=false){
  const validRows = getValidRows();
  const idx = validRows.findIndex(r => r.index === selected.row);
  if(idx >= 0){
    previewIndex = idx;
    updatePreview();
  }else if(showMessage){
    showToast('選択行はまだプレビューできません');
  }
}

function movePreview(delta){
  const validRows = getValidRows();
  if(!validRows.length) return;
  previewIndex = (previewIndex + delta + validRows.length) % validRows.length;
  updatePreview();
}

function updatePreview(){
  if(!previewVisible) return;

  const selectedResult = validation[selected.row];
  if(!selectedResult){
    previewCounter.textContent = '-';
    previewBody.innerHTML = '<div class="empty-preview">行を選択すると、ここにプレビューが表示されます。</div>';
    return;
  }

  if(selectedResult.status === 'error'){
    previewCounter.textContent = `${selected.row + 1}行目`;
    previewBody.innerHTML = renderErrorPreview(selectedResult);
    return;
  }

  if(selectedResult.status === 'empty'){
    previewCounter.textContent = `${selected.row + 1}行目`;
    previewBody.innerHTML = '<div class="empty-preview">選択行に問題と正解を入力すると、ここにプレビューが表示されます。</div>';
    return;
  }

  previewCounter.textContent = `${selected.row + 1}行目`;
  previewBody.innerHTML = renderQuestionPreview(selectedResult);
}

function applyPreviewVisibility(visible, persist=false){
  previewVisible = !!visible;
  workarea.classList.toggle('is-preview-collapsed', !previewVisible);
  previewPanel.classList.toggle('is-collapsed', !previewVisible);
  btnTogglePreview.textContent = previewVisible ? '＞' : '＜';
  const label = previewVisible ? 'プレビューを格納' : 'プレビューを展開';
  btnTogglePreview.title = label;
  btnTogglePreview.setAttribute('aria-label', label);
  btnTogglePreview.setAttribute('aria-expanded', String(previewVisible));
  if(previewVisible) updatePreview();
  else{
    previewCounter.textContent = '-';
    previewBody.innerHTML = '';
  }
  if(persist) saveUiPreferences();
}

function togglePreview(){
  applyPreviewVisibility(!previewVisible, true);
}

function restoreUiPreferences(){
  try{
    const prefs = JSON.parse(localStorage.getItem(UI_STORAGE_KEY) || '{}');
    if(prefs && prefs.previewVisible === false) applyPreviewVisibility(false, false);
  }catch(err){
    console.warn('UI設定の復元に失敗しました', err);
  }
}

function saveUiPreferences(){
  try{
    localStorage.setItem(UI_STORAGE_KEY, JSON.stringify({previewVisible}));
  }catch(err){
    console.warn('UI設定の保存に失敗しました', err);

}

function renderErrorPreview(rowResult){
  const items = rowResult.errors.map(err => `<li>${escapeHtml(err)}</li>`).join('');
  return `
    <div class="preview-card">
      <div class="badge bad">${rowResult.index + 1}行目にエラーがあります</div>
      <ul class="error-list">${items}</ul>
      <p class="preview-note">エラーを修正するとプレビュー・HTML生成の対象になります。</p>
    </div>
  `;
}

function renderQuestionPreview(row){
  const q = row.values;
  const difficultyLabel = getDifficultyLabel(q.difficulty);
  const time = q.timeLimit ? Number(q.timeLimit) : DEFAULT_TIME_LIMIT;
  const isTf = isTrueFalseAnswer(q.answer) && !q.option1 && !q.option2 && !q.option3;
  const choices = isTf ? ['○','×'] : [q.answer, q.option1, q.option2, q.option3].filter(Boolean);
  const choiceHtml = choices.map((choice, i) => `<div class="preview-choice">${i+1}　${escapeHtml(choice)}</div>`).join('');
  const meta = [
    q.category ? `カテゴリ：${escapeHtml(q.category)}` : '',
    `難易度：${difficultyLabel}`,
    `制限時間：${time}秒`,
    isTf ? '形式：○×' : `形式：${choices.length}択`
  ].filter(Boolean).map(t => `<span class="badge">${t}</span>`).join('');

  const image = normalizeProjectImage(q.image);
  const layout = image?.layout || 'none';
  const imageHtml = image ? `<div class="preview-image-wrap"><img src="${escapeHtml(image.src)}" alt="image/none"></div>` : '';
  const questionHtml = `<div class="preview-question">${escapeHtml(q.question)}</div>`;
  const bodyHtml = image && layout === 'portrait'
    ? `<div class="preview-image-and-question">${imageHtml}${questionHtml}</div>`
    : `${imageHtml}${questionHtml}`;

  return `
    <div class="preview-card ${image ? 'has-preview-image layout-' + layout : ''}">
      <div class="preview-meta">${meta}</div>
      ${bodyHtml}
      <div class="preview-choices">${choiceHtml}</div>
      ${q.explanation ? `<p class="preview-note"><strong>解説：</strong>${escapeHtml(q.explanation)}</p>` : '<p class="preview-note">解説は未入力です。</p>'}
      <p class="preview-note">現在選択している行の見え方です。配布用HTMLではプレイヤー側の仕様に従って出題されます。</p>
    </div>
  `;
}

function getDifficultyLabel(value){
  if(value === '2') return '発展';
  if(value === '3') return '難問';
  return '基本';
}

function buildQuizData(){
  return getValidRows().map(row => {
    const v = row.values;
    const options = [v.option1, v.option2, v.option3].filter(Boolean);
    const item = {
      question: v.question,
      answer: v.answer,
      options,
      explanation: v.explanation || '',
      timeLimit: v.timeLimit ? Number(v.timeLimit) : DEFAULT_TIME_LIMIT,
      category: v.category || '',
      difficulty: v.difficulty ? Number(v.difficulty) : 1
    };
    const image = normalizeProjectImage(v.image);
    if(image){
      item.image = {src:image.src, layout:image.layout || 'landscape', alt:'image/none'};
    }
    return item;
  });
}

function parseDelimitedText(text, delimiter){
  const rows = [];
  let row = [];
  let cell = '';
  let quoted = false;
  for(let i=0; i<text.length; i++){
    const ch = text[i];
    if(quoted){
      if(ch === '"'){
        if(text[i+1] === '"'){
          cell += '"';
          i++;
        }else{
          quoted = false;
        }
      }else{
        cell += ch;
      }
      continue;
    }
    if(ch === '"' && cell === ''){
      quoted = true;
    }else if(ch === delimiter){
      row.push(cell);
      cell = '';
    }else if(ch === '\n'){
      row.push(cell);
      rows.push(row);
      row = [];
      cell = '';
    }else if(ch !== '\r'){
      cell += ch;
    }
  }
  row.push(cell);
  if(row.some(v => v !== '') || rows.length) rows.push(row);
  return rows;
}

function tabularTableToRows(table){
  const clean = table.filter(row => row.some(v => normalizeCellText(v)));
  if(!clean.length) return {rows:[], truncated:false, hasHeader:false};
  const first = clean[0].map(normalizeHeader);
  const matchCount = TABULAR_COLUMNS.reduce((n,col) => n + (first.includes(normalizeHeader(col.label)) || first.includes(col.key.toLowerCase())), 0);
  const hasHeader = matchCount >= 2 || first[0] === normalizeHeader(TABULAR_COLUMNS[0].label);
  const data = hasHeader ? clean.slice(1) : clean;
  const rows = data.slice(0, ROW_COUNT).map(line => {
    const obj = {};
    TABULAR_COLUMNS.forEach((col,c) => {
      const idx = hasHeader ? findHeaderIndex(first, col, TABULAR_COLUMNS) : c;
      obj[col.key] = normalizeColumnValue(col.key, line[idx] || '');
    });
    return obj;
  });
  return {rows, truncated:data.length > ROW_COUNT, hasHeader};
}

function normalizeHeader(value){
  return normalizeCellText(value).toLowerCase().replace(/[\s_＿ー−\-]/g,'');
}

function findHeaderIndex(headers, col, columns=COLUMNS){
  const label = normalizeHeader(col.label);
  const key = col.key.toLowerCase();
  const idx = headers.findIndex(h => h === label || h === key);
  return idx >= 0 ? idx : columns.findIndex(c => c.key === col.key);
}

function exportTabularFile(mode){
  const filledRows = readRows().filter(row => TABULAR_COLUMNS.some(col => row[col.key]));
  if(!filledRows.length){
    showToast('書き出す入力済み行がありません');
    return;
  }
  const delimiter = mode === 'tsv' ? '\t' : ',';
  const table = [TABULAR_COLUMNS.map(col => col.label)].concat(filledRows.map(row => TABULAR_COLUMNS.map(col => row[col.key] || '')));
  const text = serializeDelimitedText(table, delimiter);
  const baseName = titleInput.value.trim() ? sanitizeFilename(titleInput.value.trim()) : 'quiz_data';
  const ext = mode === 'tsv' ? 'tsv' : 'csv';
  const content = mode === 'csv' ? '\uFEFF' + text : text;
  downloadTextFile(`${baseName}.${ext}`, content, mode === 'csv' ? 'text/csv;charset=utf-8' : 'text/tab-separated-values;charset=utf-8');
  showToast(`${baseName}.${ext} を書き出しました\n入力済み：${filledRows.length}行`);
}

function serializeDelimitedText(table, delimiter){
  return table.map(row => row.map(value => escapeDelimitedCell(value, delimiter)).join(delimiter)).join('\r\n');
}

function escapeDelimitedCell(value, delimiter){
  const text = String(value ?? '');
  const needsQuote = text.includes('"') || text.includes('\n') || text.includes('\r') || text.includes(delimiter);
  return needsQuote ? '"' + text.replace(/"/g,'""') + '"' : text;
}

function downloadTextFile(filename, text, type){
  const blob = new Blob([text], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function openFindPanel(){

  requestAnimationFrame(() => {
    findInput.focus();
    findInput.select();
  });
}

function closeFindPanel(){
  findPanel.hidden = true;
  findResults = [];
  findResultKeys = new Set();
  findIndex = -1;
  syncFindCount();
  applyCellClasses();
}

function handleFindInput(){
  lastFindQuery = findInput.value;
  updateFindResults(true);
}

function handleFindKeydown(e){
  if(e.isComposing) return;
  if(e.key === 'Escape'){
    e.preventDefault();
    closeFindPanel();
    focusCell(selected.row, selected.col, {preserveSelection:true});
    return;
  }
  if(e.key === 'Enter'){
    e.preventDefault();
    jumpFindResult(e.shiftKey ? -1 : 1);
  }
}

function updateFindResults(jumpOnChange){
  const needle = normalizeCellText(findInput.value || '').toLocaleLowerCase('ja-JP');
  const current = findResults[findIndex];
  findResults = [];
  findResultKeys = new Set();

  if(needle){
    for(let r=0; r<ROW_COUNT; r++){
      for(let c=0; c<COLUMNS.length; c++){
        const text = normalizeCellText(getCell(r,c)?.textContent || '').toLocaleLowerCase('ja-JP');
        if(text.includes(needle)){
          findResults.push({row:r, col:c});
          findResultKeys.add(`${r}:${c}`);
        }
      }
    }
  }

  if(!findResults.length){
    findIndex = -1;
    syncFindCount();
    applyCellClasses();
    return;
  }

  const keptIndex = current ? findResults.findIndex(item => item.row === current.row && item.col === current.col) : -1;
  if(keptIndex >= 0){
    findIndex = keptIndex;
  }else{
    findIndex = findResults.findIndex(item => item.row > selected.row || (item.row === selected.row && item.col >= selected.col));
    if(findIndex < 0) findIndex = 0;
  }

  syncFindCount();
  applyCellClasses();
  if(jumpOnChange) jumpToFindIndex(findIndex, false);
}

function jumpFindResult(delta){
  if(findPanel.hidden){
    openFindPanel();
    return;
  }
  if(!normalizeCellText(findInput.value || '')){
    findInput.focus();
    return;
  }
  if(!findResults.length){
    showToast('一致するセルがありません');
    return;
  }
  findIndex = (findIndex + delta + findResults.length) % findResults.length;
  jumpToFindIndex(findIndex, true);
}

function jumpToFindIndex(index, notify){
  const target = findResults[index];
  if(!target) return;
  setSingleCellSelection(target.row, target.col, false);
  getCell(target.row,target.col)?.scrollIntoView({block:'center', inline:'center'});
  syncFindCount();
  applyCellClasses();
  updateSelectedLabel();
  updatePreview();
  if(notify) showToast(`${target.row + 1}行目 / ${COLUMNS[target.col].label} に移動しました`);
}

function syncFindCount(){
  const total = findResults.length;
  findCount.textContent = total ? `${findIndex + 1} / ${total}件` : '0件';
  btnFindPrev.disabled = !total;
  btnFindNext.disabled = !total;
}

function isFindMatch(row,col){
  return findResultKeys.has(`${row}:${col}`);
}

function isFindCurrent(row,col){
  const current = findResults[findIndex];
  return !!current && current.row === row && current.col === col;
}

function moveSelectedRows(delta){
  const b = getSelectionBounds();
  if(delta < 0 && b.rowMin === 0) return showToast('これ以上上へ移動できません');
  if(delta > 0 && b.rowMax === ROW_COUNT - 1) return showToast('これ以上下へ移動できません');
  const rows = readRows();
  const block = rows.splice(b.rowMin, b.rowMax - b.rowMin + 1);
  const insertAt = b.rowMin + delta;
  rows.splice(insertAt, 0, ...block);
  writeRowsToGrid(rows);
  setRowSelection(insertAt, insertAt + block.length - 1);
  selected = {row:insertAt, col:0};
  validateAndRender();
  recordHistoryNow('move-rows');
  focusCell(insertAt,0,{preserveSelection:true});
  showToast(delta < 0 ? '行を上へ移動しました' : '行を下へ移動しました');
}

function compactBlankRows(){
  const rows = readRows();
  const filled = rows.filter(row => COLUMNS.some(col => row[col.key]));
  if(filled.length === rows.length) return showToast('空行はありません');
  const next = filled.concat(Array.from({length:ROW_COUNT-filled.length}, () => ({})));
  const changed = JSON.stringify(rows) !== JSON.stringify(next);
  if(!changed) return showToast('空行はありません');
  writeRowsToGrid(next);
  selected = {row:Math.min(filled.length, ROW_COUNT - 1), col:0};
  setSingleCellSelection(0,0,false);
  validateAndRender();
  recordHistoryNow('compact-rows');
  focusCell(0,0);
  showToast(`空行を詰めました\n入力済み：${filled.length}行`);
}

function clearSelectionAny(){
  const b = getSelectionBounds();
  for(let r=b.rowMin; r<=b.rowMax; r++){
    for(let c=b.colMin; c<=b.colMax; c++){
      const cell = getCell(r,c);
      if(COLUMNS[c]?.key === 'image') setRowImage(r, null, false);
      else if(cell) cell.textContent = '';
    }

  validateAndRender();
  recordHistoryNow('clear-selection-menu');
  focusCell(b.rowMin, b.colMin, {preserveSelection:true});

function copySelectionFromMenu(){

  if(!text) return;
  copyTextToClipboard(text)
    .then(() => showToast('選択範囲をコピーしました'))
    .catch(err => {
