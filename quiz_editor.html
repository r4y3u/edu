      showToast('コピーに失敗しました');
    });
}

function copyTextToClipboard(text){
  if(navigator.clipboard?.writeText){
    return navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
  }
  return fallbackCopyText(text);
}

function fallbackCopyText(text){
  return new Promise((resolve, reject) => {
    const area = document.createElement('textarea');
    area.value = text;
    area.style.position = 'fixed';
    area.style.left = '-9999px';
    document.body.appendChild(area);
    area.focus();
    area.select();
    try{
      const ok = document.execCommand('copy');
      area.remove();
      ok ? resolve() : reject(new Error('copy command failed'));
    }catch(err){
      area.remove();
      reject(err);
    }
  });
}

function hasAnyProjectContent(){
  if(titleInput.value.trim()) return true;
  if(authorInput.value.trim()) return true;
  return readRows().some(row => COLUMNS.some(col => row[col.key]));
}

function loadProjectData(data){
  if(!data || !Array.isArray(data.rows)){
    throw new Error('Invalid project file.');
  }
  if(data.format && data.format !== 'quiet-quiz-editor-project'){
    throw new Error('Unsupported project format.');
  }

  titleInput.value = normalizeCellText(data.title || '');
  authorInput.value = normalizeCellText(data.author || data.quizAuthor || '');
  writeRowsToGrid(data.rows);
  selected = {row:0, col:0};
  selection = {mode:'cell', start:{row:0, col:0}, end:{row:0, col:0}};
  selectionAnchor = {row:0, col:0};
  rowSelectionAnchor = 0;
  previewIndex = 0;
  validateAndRender();
  recordHistoryNow('load-project');
  focusCell(0,0);
}

function writeRowsToGrid(rows){
  rowImages = Array.from({length:ROW_COUNT}, () => null);
  for(let r=0; r<ROW_COUNT; r++){
    const row = rows[r] || {};
    COLUMNS.forEach((col,c) => {
      const cell = getCell(r,c);
      if(!cell) return;
      if(col.key === 'image'){
        rowImages[r] = normalizeProjectImage(row.image || null);
        renderImageCell(cell, rowImages[r]);
      }else{
        cell.textContent = normalizeColumnValue(col.key, row[col.key] || '');
      }
    });
  }
}

function prepareGeneratedHtml(){
  validateAndRender();
  if(btnGenerate.disabled){
    showToast('タイトル・問題・エラーを確認してください');
    return null;
  }

  const title = titleInput.value.trim();
  const author = normalizeQuizAuthor(authorInput.value);
  const quizData = buildQuizData();
  const filename = sanitizeFilename(title) + '.html';
  let html;
  try{
    html = buildPlayerHtml(title, quizData, author);
    verifyGeneratedHtml(html, title, quizData, author);
  }catch(err){
    console.error(err);
    showToast('生成データの確認に失敗しました');
    return null;
  }
  return {title, author, quizData, filename, html, stats:getSummaryStats()};
}

function buildPlayerHtml(title, quizData, author){
  let html = getPlayerTemplate();
  const dataLiteral = JSON.stringify(quizData, null, 2)
    .replace(/</g,'\\u003C')
    .replace(/>/g,'\\u003E')
    .replace(/&/g,'\\u0026');

  html = html.replace(/<title>[\s\S]*?<\/title>/, `<title>${escapeHtml(title)}</title>`);
  html = html.replace(/Version\s*:\s*\d+\.\d+\.\d+/, `Version : ${PLAYER_VERSION}`);
  html = html.replace(new RegExp('const VERSION = [\'\\"](?:.|\\n)*?[\'\\"];'), `const VERSION = '${PLAYER_VERSION}';`);
  html = html.replace(/const TITLE_FROM_FILE = ['"][\s\S]*?['"];/, `const TITLE_FROM_FILE = ${JSON.stringify(title)};`);
  html = html.replace(/const QUIZ_AUTHOR = ['"][\s\S]*?['"];/, `const QUIZ_AUTHOR = ${JSON.stringify(author || '匿名')};`);
  html = html.replace(/const quizData = \[[\s\S]*?\n\];/, `const quizData = ${dataLiteral};`);
  return html;
}

function verifyGeneratedHtml(html, title, quizData, author){
  const titleMatch = html.match(/const TITLE_FROM_FILE = ([\s\S]*?);/);
  if(!titleMatch || JSON.parse(titleMatch[1]) !== title){
    throw new Error('Title was not embedded correctly.');
  }

  const versionMatch = html.match(/const VERSION = ['"]([\s\S]*?)['"];/);
  if(!versionMatch || versionMatch[1] !== PLAYER_VERSION){
    throw new Error('Player version was not embedded correctly.');
  }

  const authorMatch = html.match(/const QUIZ_AUTHOR = ([\s\S]*?);/);
  if(!authorMatch || JSON.parse(authorMatch[1]) !== (author || '匿名')){
    throw new Error('Quiz author was not embedded correctly.');
  }

  const dataMatch = html.match(/const quizData = ([\s\S]*?\n\]);/);
  if(!dataMatch){
    throw new Error('Quiz data block was not found.');
  }
  const embeddedData = JSON.parse(dataMatch[1]);
  if(JSON.stringify(embeddedData) !== JSON.stringify(quizData)){
    throw new Error('Quiz data was not embedded correctly.');
  }

  return true;
}


function normalizeProjectImage(value){
  if(!value || typeof value !== 'object') return null;
  const src = String(value.src || '');
  if(!src || !src.startsWith('data:image/')) return null;
  const layout = ['landscape','square','portrait'].includes(value.layout) ? value.layout : 'landscape';
  const image = {src, layout, alt:'image/none'};
  if(value.project && typeof value.project === 'object'){
    const originalSrc = String(value.project.originalSrc || '');
    image.project = {
      originalSrc:originalSrc.startsWith('data:image/') ? originalSrc : src,
      originalName:String(value.project.originalName || value.originalName || value.name || ''),
      crop:value.project.crop && typeof value.project.crop === 'object' ? {...value.project.crop} : null,
      layout
    };
  }else if(value.originalSrc || value.originalName || value.crop){
    const originalSrc = String(value.originalSrc || '');
    image.project = {
      originalSrc:originalSrc.startsWith('data:image/') ? originalSrc : src,
      originalName:String(value.originalName || value.name || ''),
      crop:value.crop && typeof value.crop === 'object' ? {...value.crop} : null,
      layout
    };
  }
  return image;
}
function hasAnyImage(){
  return rowImages.some(Boolean);
}
function renderImageCell(cell, image){
  if(!cell) return;
  const has = !!normalizeProjectImage(image);
  cell.innerHTML = `<div class="image-cell-inner"><span class="image-cell-label">${has ? '設定済み' : 'なし'}</span><button type="button" class="image-clear" data-image-delete="${cell.dataset.row}" aria-label="画像を削除" title="画像を削除">×</button></div>`;
}
function setRowImage(row, image, render=true){
  if(!Number.isInteger(row) || row < 0 || row >= ROW_COUNT) return;
  rowImages[row] = normalizeProjectImage(image);
  const cell = getCell(row, COLUMNS.findIndex(col => col.key === 'image'));
  if(cell) renderImageCell(cell, rowImages[row]);
  if(render){
    validateAndRender();
    scheduleHistory();
  }
}
function clearRowImage(row){
  setRowImage(row, null, true);
  recordHistoryNow('clear-image');
  focusCell(row, COLUMNS.findIndex(col => col.key === 'image'));
  showToast(`${row + 1}行目の画像を削除しました`);
}
function openImageDialog(row){
  if(!Number.isInteger(row) || row < 0 || row >= ROW_COUNT) return;
  const current = normalizeProjectImage(rowImages[row]);
  const layout = current?.layout || 'landscape';
  imageDialogState = {
    row,
    layout,
    img:null,
    originalSrc:current?.project?.originalSrc || current?.src || '',
    originalName:current?.project?.originalName || '',
    crop:current?.project?.crop ? {...current.project.crop} : null,
    drag:null,
    display:null
  };
  updateRatioButtons();
  imageDialog.hidden = false;
  if(imageDialogState.originalSrc){
    loadImageIntoDialog(imageDialogState.originalSrc, imageDialogState.originalName, imageDialogState.crop);
  }else{
    drawEmptyCropCanvas();
    imageSizeNote.textContent = '画像を選択してください。';
  }
}
function closeImageDialog(){
  imageDialog.hidden = true;
  imageDialogState = null;
  imageFileInput.value = '';
}
function setImageRatio(layout){
  if(!imageDialogState || !IMAGE_RATIOS[layout]) return;
  imageDialogState.layout = layout;
  updateRatioButtons();
  resetCropToAspect(true);
}
function updateRatioButtons(){
  document.querySelectorAll('[data-image-ratio]').forEach(btn => btn.classList.toggle('is-active', btn.dataset.imageRatio === imageDialogState?.layout));
}
function handleImageFileSelected(e){
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!file || !imageDialogState) return;
  if(!/^image\/(png|jpeg|webp)$/i.test(file.type)){
    showToast('PNG / JPEG / WebP の画像を選択してください');
    return;
  }
  const reader = new FileReader();
  reader.onload = () => loadImageIntoDialog(String(reader.result || ''), file.name, null);
  reader.onerror = () => showToast('画像を読み込めませんでした');
  reader.readAsDataURL(file);
}
function loadImageIntoDialog(src, name='', crop=null){
  if(!imageDialogState || !src) return;
  const img = new Image();
  img.onload = () => {
    imageDialogState.img = img;
    imageDialogState.originalSrc = src;
    imageDialogState.originalName = name || imageDialogState.originalName || '';
    imageDialogState.crop = crop && crop.w && crop.h ? clampCrop(crop) : computeDefaultCrop();
    imageSizeNote.textContent = `元画像：${img.naturalWidth}×${img.naturalHeight}px${name ? '\n' + name : ''}`;
    drawCropCanvas();
  };
  img.onerror = () => showToast('画像を表示できませんでした');
  img.src = src;
}
function drawEmptyCropCanvas(){
  const ctx = imageCropCanvas.getContext('2d');
  ctx.clearRect(0,0,imageCropCanvas.width,imageCropCanvas.height);
  ctx.fillStyle = '#f5f7fa';
  ctx.fillRect(0,0,imageCropCanvas.width,imageCropCanvas.height);
  ctx.fillStyle = '#7a808a';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('画像を選択してください', imageCropCanvas.width/2, imageCropCanvas.height/2);
}
function getCurrentAspect(){
  return IMAGE_RATIOS[imageDialogState?.layout || 'landscape']?.aspect || 16/9;
}
function computeDefaultCrop(){
  const img = imageDialogState?.img;
  if(!img) return null;
  const iw = img.naturalWidth;
  const ih = img.naturalHeight;
  const aspect = getCurrentAspect();
  let w = iw;
  let h = w / aspect;
  if(h > ih){ h = ih; w = h * aspect; }
  return {x:(iw-w)/2, y:(ih-h)/2, w, h};
}
function clampCrop(crop){
  const img = imageDialogState?.img;
  if(!img || !crop) return crop;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  let x = Number(crop.x)||0, y = Number(crop.y)||0, w = Number(crop.w)||iw, h = Number(crop.h)||ih;
  w = Math.max(16, Math.min(w, iw));
  h = Math.max(16, Math.min(h, ih));
  x = Math.max(0, Math.min(x, iw - w));
  y = Math.max(0, Math.min(y, ih - h));
  return {x,y,w,h};
}
function resetCropToAspect(redraw){
  if(!imageDialogState?.img) return;
  imageDialogState.crop = computeDefaultCrop();
  if(redraw) drawCropCanvas();
}
function resetCropToFull(redraw){
  const img = imageDialogState?.img;
  if(!img) return;
  imageDialogState.crop = {x:0,y:0,w:img.naturalWidth,h:img.naturalHeight};
  if(redraw) drawCropCanvas();
}
function drawCropCanvas(){
  const state = imageDialogState;
  const ctx = imageCropCanvas.getContext('2d');
  ctx.clearRect(0,0,imageCropCanvas.width,imageCropCanvas.height);
  if(!state?.img){ drawEmptyCropCanvas(); return; }
  const img = state.img;
  const cw = imageCropCanvas.width, ch = imageCropCanvas.height;
  const scale = Math.min(cw / img.naturalWidth, ch / img.naturalHeight);
  const dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
  const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
  state.display = {scale, dx, dy, dw, dh};
  ctx.fillStyle = '#eef1f5';
  ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(img, dx, dy, dw, dh);
  const c = clampCrop(state.crop || computeDefaultCrop());
  state.crop = c;
  const rx = dx + c.x * scale, ry = dy + c.y * scale, rw = c.w * scale, rh = c.h * scale;
  ctx.fillStyle = 'rgba(0,0,0,.38)';
  ctx.fillRect(0,0,cw,ch);
  ctx.clearRect(rx, ry, rw, rh);
  ctx.drawImage(img, c.x, c.y, c.w, c.h, rx, ry, rw, rh);
  ctx.strokeStyle = '#f2a65a';
  ctx.lineWidth = 3;
  ctx.strokeRect(rx, ry, rw, rh);
  ctx.fillStyle = '#f2a65a';
  ctx.fillRect(rx+rw-12, ry+rh-12, 12, 12);
}
function canvasPointToImage(e){
  const rect = imageCropCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (imageCropCanvas.width / rect.width);
  const y = (e.clientY - rect.top) * (imageCropCanvas.height / rect.height);
  const d = imageDialogState?.display;
  if(!d) return null;
  return {x:(x - d.dx)/d.scale, y:(y - d.dy)/d.scale, cx:x, cy:y};
}
function bindImageCanvasEvents(){
  imageCropCanvas.addEventListener('pointerdown', (e) => {
    if(!imageDialogState?.img || !imageDialogState.crop) return;
    const p = canvasPointToImage(e);
    if(!p) return;
    const c = imageDialogState.crop;
    const d = imageDialogState.display;
    const rx = d.dx + c.x*d.scale, ry = d.dy + c.y*d.scale, rw = c.w*d.scale, rh = c.h*d.scale;
    const mode = (p.cx >= rx+rw-22 && p.cy >= ry+rh-22) ? 'resize' : 'move';
    imageDialogState.drag = {mode, start:p, original:{...c}};
    imageCropCanvas.setPointerCapture(e.pointerId);
  });
  imageCropCanvas.addEventListener('pointermove', (e) => {
    const drag = imageDialogState?.drag;
    if(!drag) return;
    const p = canvasPointToImage(e);
    const img = imageDialogState.img;
    if(!p || !img) return;
    const dx = p.x - drag.start.x;
    const dy = p.y - drag.start.y;
    let c = {...drag.original};
    if(drag.mode === 'move'){
      c.x += dx; c.y += dy;
    }else{
      const aspect = getCurrentAspect();
      let w = Math.max(24, drag.original.w + dx);
      let h = w / aspect;
      if(drag.original.y + h > img.naturalHeight){
        h = img.naturalHeight - drag.original.y;
        w = h * aspect;
      }
      c.w = w; c.h = h;
    }
    imageDialogState.crop = clampCrop(c);
    drawCropCanvas();
  });
  imageCropCanvas.addEventListener('pointerup', () => { if(imageDialogState) imageDialogState.drag = null; });
  imageCropCanvas.addEventListener('pointercancel', () => { if(imageDialogState) imageDialogState.drag = null; });
}
function blobToDataUrl(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
function canvasToBlob(canvas, type, quality){
  return new Promise(resolve => canvas.toBlob(blob => resolve(blob), type, quality));
}
async function encodeCroppedImage(){
  const state = imageDialogState;
  if(!state?.img || !state.crop) throw new Error('No image');
  const c = clampCrop(state.crop);
  const maxLong = 1280;
  const scale = Math.min(1, maxLong / Math.max(c.w, c.h));
  const outW = Math.max(1, Math.round(c.w * scale));
  const outH = Math.max(1, Math.round(c.h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(state.img, c.x, c.y, c.w, c.h, 0, 0, outW, outH);
  let blob = null;
  for(const q of [0.82,0.76,0.68,0.60]){
    blob = await canvasToBlob(canvas, 'image/webp', q);
    if(blob && blob.size <= 1024 * 1024) break;
  }
  if(!blob) blob = await canvasToBlob(canvas, 'image/jpeg', 0.82);
  if(!blob) throw new Error('Encode failed');
  const src = await blobToDataUrl(blob);
  return {
    src,
    layout:state.layout,
    alt:'image/none',
    project:{
      originalSrc:state.originalSrc,
      originalName:state.originalName,
      crop:c,
      layout:state.layout
    }
  };
}
async function applyImageDialog(){
  if(!imageDialogState?.img){
    showToast('画像を選択してください');
    return;
  }
  btnImageApply.disabled = true;
  imageSizeNote.textContent = 'WebPへ変換中...';
  try{
    const image = await encodeCroppedImage();
    const approx = Math.round((image.src.length * 3 / 4) / 1024);
    setRowImage(imageDialogState.row, image, true);
    recordHistoryNow('set-image');
    showToast(`${imageDialogState.row + 1}行目に画像を添付しました\n約${approx}KB`);
    closeImageDialog();
  }catch(err){
    console.error(err);
    showToast('画像の変換に失敗しました');
  }finally{
    btnImageApply.disabled = false;
  }
}
function deleteImageFromDialog(){
  if(!imageDialogState) return;
  clearRowImage(imageDialogState.row);
  closeImageDialog();
}

function getPlayerTemplate(){
  if(playerTemplateCache) return playerTemplateCache;
  const binary = atob(PLAYER_TEMPLATE_B64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  playerTemplateCache = new TextDecoder('utf-8').decode(bytes);
  return playerTemplateCache;
}

function clearRow(row){
  if(!Number.isInteger(row) || row < 0 || row >= ROW_COUNT) return;
  COLUMNS.forEach((col,c) => {
    const cell = getCell(row,c);
    if(col.key === 'image') setRowImage(row, null, false);
    else if(cell) cell.textContent = '';
  });
  setSingleCellSelection(row, 0, false);
  validateAndRender();
  recordHistoryNow('clear-row');
  focusCell(row,0);
  showToast(`${row + 1}行目をクリアしました`);
}

function clearGrid(){
  const hasAny = readRows().some(row => COLUMNS.some(col => row[col.key]));
  if(hasAny && !confirm('入力中の表をすべてクリアします。よろしいですか？')) return;
  for(let r=0; r<ROW_COUNT; r++){
    COLUMNS.forEach((col,c) => {
      const cell = getCell(r,c);
      if(col.key === 'image') setRowImage(r, null, false);
      else if(cell) cell.textContent = '';
    });
  }
  previewIndex = 0;
  validateAndRender();
  recordHistoryNow('clear-grid');
  focusCell(0,0);
  showToast('表をクリアしました');
}

function sanitizeFilename(name){
  return name.trim()
    .replace(/[\/:*?"<>|]/g,'_')
    .replace(/\s+/g,'_')
    .replace(/_+/g,'_')
    .slice(0,80) || 'quiz';
}

function sanitizeStorageKey(name){
  return sanitizeFilename(name).replace(/[^\w぀-ヿ㐀-鿿\-]/g,'_');
}

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function showBusy(message='生成中...'){
  busyMessage.textContent = message;
  busyOverlay.hidden = false;
}

function hideBusy(){
  busyOverlay.hidden = true;
}

function waitForPaint(){
  return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
}

function showToast(message){
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

init();
